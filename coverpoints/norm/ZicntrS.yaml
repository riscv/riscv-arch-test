normative_rule_definitions:
  # The counter-enable (scounteren) CSR is a 32-bit register that controls the
  # availability of the hardware performance monitoring counters to U-mode.
  - names: [scounteren_sz, scounteren_mode]
    coverpoint: [""]

  # scounteren must be implemented. However, any of the bits may be read-only zero,
  # indicating reads to the corresponding counter will cause an exception when
  # executing in U-mode. Hence, they are effectively WARL fields.
  - name: scounteren_acc
    coverpoint: [""]

  # When the CY, TM, IR, or HPMn bit in the scounteren register is clear, attempts
  # to read the cycle, time, instret, or hpmcountern register while executing in
  # U-mode will cause an illegal-instruction exception. When one of these bits is
  # set, access to the corresponding register is permitted.
  - name: scounteren_op
    coverpoint: [""]
