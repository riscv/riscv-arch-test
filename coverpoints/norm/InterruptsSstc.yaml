normative_rule_definitions:
  # The Sstc extension adds the STCE (STimecmp Enable) bit to menvcfg CSR. When the
  # Sstc extension is not implemented, STCE is read-only zero. The STCE bit enables
  # stimecmp for S-mode when set to one. When this extension is implemented and STCE
  # in menvcfg is zero, an attempt to access stimecmp in a mode other than M-mode
  # raises an illegal-instruction exception, STCE in henvcfg is read-only zero, and
  # STIP in mip and sip reverts to its defined behavior as if this extension is not
  # implemented. Further, if the H extension is implemented, then hip.VSTIP also
  # reverts its defined behavior as if this extension is not implemented.
  - name: menvcfg-stce
    coverpoint: ["InterruptsSstc_cg/cp_{supervisor/user}_stce.  See also SstcH"]

  # when the TM bit in the mcounteren register is clear, attempts to access the
  # stimecmp or vstimecmp register while executing in a mode less privileged than M
  # will cause an illegal-instruction exception.
  - name: mcounteren_tm_clr
    coverpoint: ["InterruptsSstc_cg/cp_{supervisor,user}_tm, see also SstcH"]

  # When this bit is set, access to the stimecmp or vstimecmp register is permitted
  # in S-mode if implemented, and access to the vstimecmp register (via stimecmp) is
  # permitted in VS-mode if implemented and not otherwise prevented by the TM bit in
  # hcounteren.
  - name: mcounteren_tm_set
    coverpoint: ["InterruptsSstc_cg/cp_{supervisor,user}_tm, see also SstcH"]

  # The stimecmp CSR is a 64-bit register and has 64-bit precision on all RV32 and
  # RV64 systems. In RV32 only, accesses to the stimecmp CSR access the low 32 bits,
  # while accesses to the stimecmph CSR access the high 32 bits of stimecmp.
  - name: stimecmp-stimecmph_sz_acc
    coverpoint: [""]

  # A supervisor timer interrupt becomes pending, as reflected in the STIP bit in
  # the mip and sip registers whenever time contains a value greater than or equal
  # to stimecmp, treating the values as unsigned integers. If the result of this
  # comparison changes, it is guaranteed to be reflected in STIP eventually, but not
  # necessarily immediately. The interrupt remains posted until stimecmp becomes
  # greater than time, typically as a result of writing stimecmp. The interrupt will
  # be taken based on the standard interrupt enable and delegation rules.
  - names: [mip_stip_op, sip_stip_op]
    coverpoint: [""]
