name: Build & Publish CTP

on:
  workflow_dispatch:
  push:
    branches:
      - act4
    paths:
      - "ctp/**"
      - "generators/ctp/**"
      - "testplans/**"
      - ".github/workflows/ctp-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - run: git submodule update --init ctp/docs-resources

      - name: Pull Container
        run: docker pull riscvintl/riscv-docs-base-container-image:latest

      - name: Build
        run: cd ctp && make -j2

      - name: Make GitHub pages directory
        run: |
          mkdir github-pages
          cp ctp/build/ctp.html github-pages/index.html

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ctp.pdf
          path: ctp/build/ctp.pdf

      - name: Upload HTML
        uses: actions/upload-artifact@v4
        with:
          name: ctp.html
          path: ctp/build/ctp.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download PDF
        uses: actions/download-artifact@v4
        with:
          name: ctp.pdf
          path: ./

      - name: Download HTML
        uses: actions/download-artifact@v4
        with:
          name: ctp.html
          path: ./

      - name: Get current date
        run: |
          echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${GITHUB_SHA::7})" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          draft: false
          prerelease: ${{ ! (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true') }}
          make_latest: true
          # generate_release_notes: true
          tag_name: ctp-${{ env.CURRENT_DATE }}-${{ env.SHORT_SHA }}
          name: "CTP Release ${{ env.CURRENT_DATE }}: ${{ env.SHORT_SHA }}"
          body: |
            This release was created by: ${{ github.event.sender.login }}
          files: |
            ctp.pdf
            ctp.html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
