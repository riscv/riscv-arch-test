    coverpoint: ["I_slliw_cg/{cp_rs1, cp_rd, cp_uimm_5, cr_rs1_imm_edges_uimm}"]
  - name: sllw_op
    coverpoint: ["I_sllw_cg/{cp_rs1, cp_rs2, cp_rd, cr_rs1_rs2_edges}"]
  - name: sra_sh_amt_rv64i
