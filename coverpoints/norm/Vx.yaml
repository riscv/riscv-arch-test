    coverpoint: [""]

  # Vector mask logical instructions are always unmasked,
  - name: vmasklogical_unmasked
    coverpoint: [""]

  # so there are no inactive elements, and the encodings with vm=0 are reserved.
  - name: vmasklogical_masked_rsv
    coverpoint: [""]

  # Mask elements past vl, the tail elements, are always updated with a
  # tail-agnostic policy.
  - name: vmasklogical_tail_agnostic
    coverpoint: [""]

  # vmand.mm vd, vs2, vs1 # vd.mask[i] = vs2.mask[i] &amp;&amp; vs1.mask[i]
  # vmnand.mm vd, vs2, vs1 # vd.mask[i] = !(vs2.mask[i] &amp;&amp; vs1.mask[i])
  # vmandn.mm vd, vs2, vs1 # vd.mask[i] = vs2.mask[i] &amp;&amp; !vs1.mask[i]
  # vmxor.mm vd, vs2, vs1 # vd.mask[i] = vs2.mask[i] ^^ vs1.mask[i] vmor.mm vd, vs2,
  # vs1 # vd.mask[i] = vs2.mask[i] || vs1.mask[i] vmnor.mm vd, vs2, vs1 # vd.mask[i]
  # = !(vs2.mask[i] || vs1.mask[i]) vmorn.mm vd, vs2, vs1 # vd.mask[i] = vs2.mask[i]
  # || !vs1.mask[i] vmxnor.mm vd, vs2, vs1 # vd.mask[i] = !(vs2.mask[i] ^^
  # vs1.mask[i])
  - names:
      [
        vmand_op,
        vmnand_op,
        vmandn_op,
        vmxor_op,
        vmor_op,
        vmnor_op,
        vmorn_op,
        vmxnor_op,
      ]
    coverpoint: [""]

  # The source operand is a single vector register holding mask register values as
  # described in &lt;&lt;sec-mask-register-layout&gt;&gt;.
  - name: vcpop_vs_single_vreg
    coverpoint: [""]

  # The vcpop.m instruction counts the number of mask elements of the active
  # elements of the vector source mask register that have the value 1 and writes the
  # result to a scalar x register. The operation can be performed under a mask, in
  # which case only the masked elements are counted.
  - name: vcpop_op
    coverpoint: [""]

  # The vcpop.m instruction writes x[rd] even if vl=0 (with the value 0, since no
  # mask elements are active).
  - name: vcpop_vl0
    coverpoint: [""]

  # Traps on vcpop.m are always reported with a vstart of 0.
  - name: vcpop_trap
    coverpoint: [""]

  # The vcpop.m instruction will raise an illegal-instruction exception if vstart is
  # non-zero.
  - name: vcpop_vstart_n0_ill
    coverpoint: [""]

  # The vfirst instruction finds the lowest-numbered active element of the source
  # mask vector that has the value 1 and writes that element's index to a GPR. If no
  # active element has the value 1, -1 is written to the GPR.
  - name: vfirst_op
    coverpoint: [""]

  # The vfirst.m instruction writes x[rd] even if vl=0 (with the value -1, since no
  # mask elements are active).
  - name: vfirst_vl0
    coverpoint: [""]

  # Traps on vfirst are always reported with a vstart of 0.
  - name: vfirst_trap
    coverpoint: [""]

  # The vfirst instruction will raise an illegal-instruction exception if vstart is
  # non-zero.
  - name: vfirst_vstart_n0_ill
    coverpoint: [""]

  # The vmsbf.m instruction takes a mask register as input and writes results to a
  # mask register. The instruction writes a 1 to all active mask elements before the
  # first active source element that is a 1, then writes a 0 to that element and all
  # following active elements. If there is no set bit in the active elements of the
  # source vector, then all active elements in the destination are written with a 1.
  - name: vmsbf_op
    coverpoint: [""]

  # The tail elements in the destination mask register are updated under a
  # tail-agnostic policy.
  - name: vmsbf_tail_agnostic
    coverpoint: [""]

  # Traps on vmsbf.m are always reported with a vstart of 0.
  - name: vmsbf_trap
    coverpoint: [""]

  # The vmsbf instruction will raise an illegal-instruction exception if vstart is
  # non-zero.
  - name: vmsbf_vstart_n0_ill
    coverpoint: [""]

  # The destination register cannot overlap the source register and, if masked,
  # cannot overlap the mask register ('v0').
  - name: vmsbf_vreg_constr
    coverpoint: [""]

  # The vector mask set-including-first instruction is similar to set-before-first,
  # except it also includes the element with a set bit.
  - name: vmsif_op
    coverpoint: [""]

  # The tail elements in the destination mask register are updated under a
  # tail-agnostic policy.
  - name: vmsif_tail_agnostic
    coverpoint: [""]

  # Traps on vmsif.m are always reported with a vstart of 0.
  - name: vmsif_trap
    coverpoint: [""]

  # The vmsif instruction will raise an illegal-instruction exception if vstart is
  # non-zero.
  - name: vmsif_vstart_n0_ill
    coverpoint: [""]

  # The destination register cannot overlap the source register and, if masked,
  # cannot overlap the mask register ('v0').
  - name: vmsif_vreg_constr
    coverpoint: [""]

  # The vector mask set-only-first instruction is similar to set-before-first,
  # except it only sets the first element with a bit set, if any.
  - name: vmsof_op
    coverpoint: [""]

  # The tail elements in the destination mask register are updated under a
  # tail-agnostic policy.
  - name: vmsof_tail_agnostic
    coverpoint: [""]

  # Traps on vmsof.m are always reported with a vstart of 0.
  - name: vmsof_trap
    coverpoint: [""]

  # The vmsof instruction will raise an illegal-instruction exception if vstart is
  # non-zero.
  - name: vmsof_vstart_n0_ill
    coverpoint: [""]

  # The destination register cannot overlap the source register and, if masked,
  # cannot overlap the mask register ('v0').
  - name: vmsof_vreg_constr
    coverpoint: [""]

  # The viota.m instruction reads a source vector mask register and writes to each
  # element of the destination vector register group the sum of all the bits of
  # elements in the mask register whose index is less than the element, e.g., a
  # parallel prefix sum of the mask values. This instruction can be masked, in which
  # case only the enabled elements contribute to the sum. The result value is
  # zero-extended to fill the destination element if SEW is wider than the result.
  # If the result value would overflow the destination SEW, the least-significant
  # SEW bits are retained.
  - name: viota_op
    coverpoint: [""]

  # Traps on viota.m are always reported with a vstart of 0,
  - name: viota_trap
    coverpoint: [""]

  # An illegal-instruction exception is raised if vstart is non-zero.
  - name: viota_vstart_n0_ill
    coverpoint: [""]

  # The destination register group cannot overlap the source register and, if
  # masked, cannot overlap the mask register (v0).
  - name: viota_vreg_constr
    coverpoint: [""]

  # The vid.v instruction writes each element's index to the destination vector
  # register group, from 0 to vl-1. The instruction can be masked. Masking does not
  # change the index value written to active elements. The result value is
  # zero-extended to fill the destination element if SEW is wider than the result.
  # If the result value would overflow the destination SEW, the least-significant
  # SEW bits are retained.
  - name: vid_op
    coverpoint: [""]

  # The vs2 field of the instruction must be set to v0, otherwise the encoding is
  # reserved.
  - name: vid_vs2_nv0_rsv
    coverpoint: [""]

  # The instructions ignore LMUL and vector register groups.
  - names: [vmv-x-s_ignoreLMUL, vmv-s-x_ignoreLMUL]
    coverpoint: [""]

  # The vmv.x.s instruction copies a single SEW-wide element from index 0 of the
  # source vector register to a destination integer register. If SEW &gt; XLEN, the
  # least-significant XLEN bits are transferred and the upper SEW-XLEN bits are
  # ignored. If SEW &lt; XLEN, the value is sign-extended to XLEN bits.
  - name: vmv-x-s_op
    coverpoint: [""]

  # vmv.x.s performs its operation even if vstart {ge} vl or vl=0.
  - names: [vmv-x-s_vstart_ge_vl, vmv-x-s_vl0]
    coverpoint: [""]

  # The vmv.s.x instruction copies the scalar integer register to element 0 of the
  # destination vector register. If SEW &lt; XLEN, the least-significant bits are
  # copied and the upper XLEN-SEW bits are ignored. If SEW &gt; XLEN, the value is
  # sign-extended to SEW bits. The other elements in the destination vector register
  # ( 0 &lt; index &lt; VLEN/SEW) are treated as tail elements using the current
  # tail agnostic/undisturbed policy.
  - name: vmv-s-x_op
    coverpoint: [""]

  # If vstart {ge} vl, no operation is performed and the destination register is not
  # updated.
  - name: vmv-s-x_vstart_ge_vl
    coverpoint: [""]

  # The encodings corresponding to the masked versions (vm=0) of vmv.x.s and vmv.s.x
  # are reserved.
  - names: [vmv-s-x_masked_rsv, vmv-x-s_masked_rsv]
    coverpoint: [""]

  # The instructions ignore LMUL and vector register groups.
  - names: [vfmv-f-s_ignoreLMUL, vfmv-s-f_ignoreLMUL]
    coverpoint: [""]

  # The vfmv.f.s instruction copies a single SEW-wide element from index 0 of the
  # source vector register to a destination scalar floating-point register.
  - name: vfmv-f-s_op
    coverpoint: [""]

  # The vfmv.s.f instruction copies the scalar floating-point register to element 0
  # of the destination vector register. The other elements in the destination vector
  # register ( 0 &lt; index &lt; VLEN/SEW) are treated as tail elements using the
  # current tail agnostic/undisturbed policy.
  - name: vfmv-s-f_op
    coverpoint: [""]

  # If vstart {ge} vl, no operation is performed and the destination register is not
  # updated.
  - name: vfmv-s-f_vstart_ge_vl
    coverpoint: [""]

  # The encodings corresponding to the masked versions (vm=0) of vfmv.f.s and
  # vfmv.s.f are reserved.
  - name: vfmv-s-f_masked_rsv
    coverpoint: [""]

  # For all of the vslideup, vslidedown, v[f]slide1up, and v[f]slide1down
  # instructions, if vstart {ge} vl, the instruction performs no operation and
  # leaves the destination vector register unchanged.
  - names:
      [
        vslideup_vstart_ge_vl,
        vslidedown_vstart_ge_vl,
        vslide1up_vstart_ge_vl,
        vslide1down_vstart_ge_vl,
        vfslide1up_vstart_ge_vl,
        vfslide1down_vstart_ge_vl,
      ]
    coverpoint: [""]

  # The slide instructions may be masked, with mask element i controlling whether
  # destination element i is written. The mask undisturbed/agnostic policy is
  # followed for inactive elements.
  - names:
      [
        vslideup_mask,
        vslidedown_mask,
        vslide1up_mask,
        vslide1down_mask,
        vfslide1up_mask,
        vfslide1down_mask,
      ]
    coverpoint: [""]

  # For vslideup, the value in vl specifies the maximum number of destination
  # elements that are written. The start index (OFFSET) for the destination can be
  # either specified using an unsigned integer in the x register specified by rs1,
  # or a 5-bit immediate, zero-extended to XLEN bits. If XLEN &gt; SEW, OFFSET is
  # not truncated to SEW bits. Destination elements OFFSET through vl-1 are written
  # if unmasked and if OFFSET &lt; vl.
  - name: vslideup_op
    coverpoint: [""]

  # The destination vector register group for vslideup cannot overlap the source
  # vector register group, otherwise the instruction encoding is reserved.
  - name: vslideup_vreg_constr
    coverpoint: [""]

  # For vslidedown, the value in vl specifies the maximum number of destination
  # elements that are written. The remaining elements past vl are handled according
  # to the current tail policy (&lt;&lt;sec-agnostic&gt;&gt;). The start index
  # (OFFSET) for the source can be either specified using an unsigned integer in the
  # x register specified by rs1, or a 5-bit immediate, zero-extended to XLEN bits.
  # If XLEN &gt; SEW, OFFSET is not truncated to SEW bits.
  - name: vslidedown_op
    coverpoint: [""]

  # The vslide1up instruction places the x register argument at location 0 of the
  # destination vector register group, provided that element 0 is active, otherwise
  # the destination element update follows the current mask agnostic/undisturbed
  # policy. If XLEN &lt; SEW, the value is sign-extended to SEW bits. If XLEN &gt;
  # SEW, the least-significant bits are copied over and the high XLEN-SEW bits are
  # ignored. The remaining active vl-1 elements are copied over from index i in the
  # source vector register group to index i+1 in the destination vector register
  # group. The vl register specifies the maximum number of destination vector
  # register elements updated with source values, and remaining elements past vl are
  # handled according to the current tail policy (&lt;&lt;sec-agnostic&gt;&gt;).
  - name: vslide1up-vx_op
    coverpoint: [""]

  # The vslide1up instruction requires that the destination vector register group
  # does not overlap the source vector register group. Otherwise, the instruction
  # encoding is reserved.
  - name: vslide1up-vx_vreg_constr
    coverpoint: [""]

  # The vfslide1up instruction is defined analogously to vslide1up, but sources its
  # scalar argument from an f register.
  - name: vslide1up-vf_op
    coverpoint: [""]

  # The vslide1down instruction copies the first vl-1 active elements values from
  # index i+1 in the source vector register group to index i in the destination
  # vector register group. The vl register specifies the maximum number of
  # destination vector register elements written with source values, and remaining
  # elements past vl are handled according to the current tail policy
  # (&lt;&lt;sec-agnostic&gt;&gt;). The vslide1down instruction places the x
  # register argument at location vl-1 in the destination vector register, provided
  # that element vl-1 is active, otherwise the destination element update follows
  # the current mask agnostic/undisturbed policy. If XLEN &lt; SEW, the value is
  # sign-extended to SEW bits. If XLEN &gt; SEW, the least-significant bits are
  # copied over and the high SEW-XLEN bits are ignored.
  - name: vslide1down-vx_op
    coverpoint: [""]

  # The vfslide1down instruction is defined analogously to vslide1down, but sources
  # its scalar argument from an f register.
  - name: vslide1down-vf_op
    coverpoint: [""]

  # The index values in the second vector are treated as unsigned integers.
  - names: [vrgather_vs2_uint, vrgatherei16_vs2_uint]
    coverpoint: [""]

  # The source vector can be read at any index &lt; VLMAX regardless of vl.
  - names: [vrgather_vs_ignore_vl, vrgatherei16_vs_ignore_vl]
    coverpoint: [""]

  # The maximum number of elements to write to the destination register is given by
  # vl,
  - names: [vrgather_vl, vrgatherei16_vl]
    coverpoint: [""]

  # and the remaining elements past vl are handled according to the current tail
  # policy (&lt;&lt;sec-agnostic&gt;&gt;).
  - names: [vrgather_tail, vrgatherei16_tail]
    coverpoint: [""]

  # The operation can be masked, and the mask undisturbed/agnostic policy is
  # followed for inactive elements.
  - names: [vrgather_mask, vrgatherei16_mask]
    coverpoint: [""]

  # The vrgather.vv form uses SEW/LMUL for both the data and indices.
  - name: vrgather-vv_sew_lmul
    coverpoint: [""]

  # The vrgatherei16.vv form uses SEW/LMUL for the data in vs2 but EEW=16 and EMUL =
  # (16/SEW)*LMUL for the indices in vs1.
  - name: vrgatherei16-vv_sew_lmul
    coverpoint: [""]

  # If an element index is out of range ( vs1[i] {ge} VLMAX ) then zero is returned
  # for the element value.
  - names: [vrgather_id_ge_VLMAX, vrgatherei16_id_ge_VLMAX]
    coverpoint: [""]

  # Vector-scalar and vector-immediate forms of the register gather are also
  # provided. These read one element from the source vector at the given index, and
  # write this value to the active elements of the destination vector register. The
  # index value in the scalar register and the immediate, zero-extended to XLEN
  # bits, are treated as unsigned integers. If XLEN &gt; SEW, the index value is not
  # truncated to SEW bits.
  - names: [vrgather-vx_op, vrgather-vi_op]
    coverpoint: [""]

  # For any vrgather instruction, the destination vector register group cannot
  # overlap with the source vector register groups, otherwise the instruction
  # encoding is reserved.
  - names: [vrgather_vreg_constr, vrgatherei16_vreg_constr]
    coverpoint: [""]

  # The vector mask register specified by vs1 indicates which of the first vl
  # elements of vector register group vs2 should be extracted and packed into
  # contiguous elements at the beginning of vector register vd. The remaining
  # elements of vd are treated as tail elements according to the current tail policy
  # (&lt;&lt;sec-agnostic&gt;&gt;).
  - name: vcompress_op
    coverpoint: [""]

  # T`vcompress` is encoded as an unmasked instruction (vm=1).
  - name: vcompress_enc
    coverpoint: [""]

  # The equivalent masked instruction (vm=0) is reserved.
  - name: vcompress_masked_rsv
    coverpoint: [""]

  # The destination vector register group cannot overlap the source vector register
  # group or the source mask register, otherwise the instruction encoding is
  # reserved.
  - name: vcompress_vreg_constr
    coverpoint: [""]

  # A trap on a vcompress instruction is always reported with a vstart of 0.
  - name: vcompress_trap
    coverpoint: [""]

  # Executing a vcompress instruction with a non-zero vstart raises an
  # illegal-instruction exception.
  - name: vcompress_vstart_n0_ill
    coverpoint: [""]

  # The vmv&lt;nr&gt;r.v instructions copy whole vector registers (i.e., all VLEN
  # bits) and can copy whole vector register groups. The nr value in the opcode is
  # the number of individual vector registers, NREG, to copy. The instructions
  # operate as if EEW=SEW, EMUL = NREG, effective length evl= EMUL * VLEN/SEW.
  - name: vmv-nr-r_op
    coverpoint: [""]

  # The instruction is encoded as an OPIVI instruction. The number of vector
  # registers to copy is encoded in the low three bits of the simm field (simm[2:0])
  # using the same encoding as the nf[2:0] field for memory instructions (Figure
  # &lt;&lt;fig-nf&gt;&gt;), i.e., simm[2:0] = NREG-1.
  - name: vmv-nr-r_enc
    coverpoint: [""]

  # The value of NREG must be 1, 2, 4, or 8, and values of simm[4:0] other than 0,
  # 1, 3, and 7 are reserved.
  - name: vmv-nr-r_nreg_rsv
    coverpoint: [""]

  # The source and destination vector register numbers must be aligned appropriately
  # for the vector register group size,
  - name: vmv-nr-r_vreg_constr
    coverpoint: [""]

  # encodings with other vector register numbers are reserved.
  - name: vmv-nr-r_unaligned_rsv
    coverpoint: [""]

  # On a trap during a vector instruction (caused by either a synchronous exception
  # or an asynchronous interrupt), the existing *epc CSR is written with a pointer
