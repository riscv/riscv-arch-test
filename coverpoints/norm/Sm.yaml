  - name: mcycle_shared
    coverpoint: ["Not tested; requires multi-hart core"]

  # reads of the mcycleh, minstreth, mhpmcounternh, and mhpmeventnh CSRs return bits
  # 63-32 of the corresponding register, and writes change only bits 63-32.
  - names: [mcycleh_op, minstreth_op, mhpmcounterh_op, mhpmeventh_op]
    coverpoint:
      ["Sm_mcsr_cg/cp_cntr_access/{mcycleh,minstreth,mhpmcounterh,mhpmeventh}"]

  # The minstret CSR counts the number of instructions the hart has retired.
  - name: minstret_op
    coverpoint: ["Sm_mcsr_cg/cp_cntr_access/minstret"]

  # The mcycle and minstret registers have 64-bit precision on all RV32 and RV64
