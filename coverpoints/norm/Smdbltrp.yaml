normative_rule_definitions:
  # When the MDT bit is set to 1 by an explicit CSR write, the MIE (Machine
  # Interrupt Enable) bit is cleared to 0.
  - name: mstatus_mie_clr_by_mdt
    coverpoint: ["Sm_mcsr_cg/cp_mcsrwalk/mstatus"]

  # When the MDT bit is set to 1 by an explicit CSR write, the MIE (Machine
  # Interrupt Enable) bit is cleared to 0. For RV64, this clearing occurs regardless
  # of the value written, if any, to the MIE bit by the same write.
  - name: mstatus_mie_clr_by_mdt_rv64
    coverpoint: ["Sm_mcsr_cg/cp_mcsrwalk/mstatus"]

  # The MIE bit can only be set to 1 by an explicit CSR write if the MDT bit is
  # already 0
  - name: mstatus_mie_set_mdt_0
    coverpoint: ["TODO"]

  # The MIE bit can only be set to 1 by an explicit CSR write if the MDT bit is
  # already 0 or, for RV64, is being set to 0 by the same write
  - name: mstatus_mie_set_mdt_0_rv64
    coverpoint: ["TODO"]

  # Upon reset, the MDT field is set to 1.
  - name: mstatus_mdt_rst
    coverpoint: [""]

  # A trap caused by an RNMI does not set the MDT bit.
  - name: mstatus_mdt_not_set_rnmi
    coverpoint: [""]

  # The MRET and SRET instructions, when executed in M-mode, set the MDT bit to 0.
  - name: mstatus_mdt_clr_mret_sret
    coverpoint: [""]

  # The MNRET instruction, provided by the Smrnmi extension, sets the MDT bit to 0
  # if the new privilege mode is not M.
  - name: mstatus_mdt_clr_mnret
    coverpoint: [""]

  # The MRET and SRET instructions, when executed in M-mode, set the MDT bit to 0.
  # If the new privilege mode is U, VS, or VU, then sstatus.SDT is also set to 0.
  - name: sstatus_sdt_clr_mret_sret
    coverpoint: [""]

  # The MRET and SRET instructions, when executed in M-mode, set the MDT bit to 0.
  # Additionally, if it is VU, then vsstatus.SDT is also set to 0.
  - name: vsstatus_sdt_clr_mret_sret
    coverpoint: [""]

  # When a trap is to be taken into M-mode, if the MDT bit is currently 0, it is
  # then set to 1, and the trap is delivered as expected.
  - name: trap_exp
    coverpoint: [""]

  # When a trap is to be taken into M-mode, if the MDT bit is currently 0, it is
  # then set to 1, and the trap is delivered as expected. However, if MDT is already
  # set to 1, then this is an unexpected trap.
  - name: trap_unexp
    coverpoint: [""]
