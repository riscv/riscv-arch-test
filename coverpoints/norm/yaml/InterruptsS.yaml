normative_rule_definitions:
  # When S-mode is implemented, then executing WFI in U-mode causes an
  # illegal-instruction exception, regardless of the value of the TW bit, unless the
  # instruction completes within an implementation-specific, bounded time limit.
  - name: mstatus_tw_umode_op
    coverpoint: [""]

  # If supervisor mode is implemented, bits mip.SEIP and mie.SEIE are the
  # interrupt-pending and interrupt-enable bits for supervisor-level external
  # interrupts.
  - names: [mip_seip_op, mie_seie_op]
    coverpoint: ["*** some will need to move to S priv"]

  # SEIP is writable in mip
  - name: mip_seip_acc
    coverpoint: [""]

  # When mip is read with a CSR instruction, the value of the SEIP bit returned in
  # the rd destination register is the logical-OR of the software-writable bit and
  # the interrupt signal from the interrupt controller
  - name: mip_seip_rdcsr
    coverpoint: [""]

  # the signal from the interrupt controller is not used to calculate the value
  # written to SEIP. Only the software-writable SEIP bit participates in the
  # read-modify-write sequence of a CSRRS or CSRRC instruction.
  - name: mip_seip_wrcsr
    coverpoint: [""]

  # If the stimecmp register is not implemented, STIP is writable in mip
  - name: mip_stip_no-stimecmp_acc
    coverpoint: [""]

  # If supervisor mode is implemented, its mip.STIP and mie.STIE are the
  # interrupt-pending and interrupt-enable bits for supervisor-level timer
  # interrupts. If the stimecmp register is not implemented, STIP is writable in mip
  # may be written by M-mode software to deliver timer interrupts to S-mode.
  - name: mip_stip_no-stimecmp_op
    coverpoint: [""]

  # If the stimecmp (supervisor-mode timer compare) register is implemented, STIP is
  # read-only in mip
  - name: mip_stip_stimecmp_acc
    coverpoint: [""]

  # If supervisor mode is implemented, its mip.STIP and mie.STIE are the
  # interrupt-pending and interrupt-enable bits for supervisor-level timer
  # interrupts. If the stimecmp (supervisor-mode timer compare) register is
  # implemented, STIP is read-only in mip reflects the supervisor-level timer
  # interrupt signal resulting from stimecmp.
  - name: mip_stip_stimecmp_op
    coverpoint: [""]

  # This timer interrupt signal is cleared by writing stimecmp with a value greater
  # than the current time value.
  - name: mip_stip_stimecmp_clr
    coverpoint: [""]

  # If supervisor mode is implemented, its mip.STIP and mie.STIE are the
  # interrupt-pending and interrupt-enable bits for supervisor-level timer
  # interrupts.
  - name: mip_stie_op
    coverpoint: [""]

  # SSIP is writable in mip
  - name: mip_ssip_acc
    coverpoint: [""]

  # If supervisor mode is implemented, bits mip.SSIP and mie.SSIE are the
  # interrupt-pending and interrupt-enable bits for supervisor-level software
  # interrupts.
  - names: [mip_ssip_op, mie_ssie_op]
    coverpoint: [""]

  # SSIP is writable in mip may also be set to 1 by a platform-specific interrupt
  # controller.
  - name: mip_ssip_intr_ctrl
    coverpoint: [""]
