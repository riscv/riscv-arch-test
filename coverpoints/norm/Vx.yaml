# Normative rule to coverpoint mappings
# Generated from riscv-isa-manual normative rule definitions

normative_rule_definitions:
  # The maximum size in bits of a vector element that any operation can produce or
  # consume, ELEN {ge} 8, which must be a power of 2.
  - name: ELEN
    coverpoint: [""]

  # The number of bits in a single vector register, VLEN {ge} ELEN, which must be a
  # power of 2, and must be no greater than 2^16^.
  - name: VLEN
    coverpoint: [""]

  # A small implementation supporting ELEN=32 requires only seven bits of state in
  # vtype: two bits for ma and ta, two bits for vsew[1:0] and three bits for
  # vlmul[2:0]. The illegal value represented by vill can be internally encoded
  # using the illegal 64-bit combination in vsew[1:0] without requiring an
  # additional storage bit to hold vill.
  - name: vill_implicit_encoding
    coverpoint: [""]

  # Implementations may also change mstatus.VS or vsstatus.VS from Initial or Clean
  # to Dirty at any time, even when there is no change in vector state.
  - name: hw_mstatus_vs_dirty_update
    coverpoint: [""]

  # Implementations may set vill in either case.
  - name: reserved_vill_set
    coverpoint: [""]

  # The vector extension adds 32 architectural vector registers, v0-v31 to the base
  # scalar RISC-V ISA.
  - name: vreg_count
    coverpoint: [""]

  # A vector context status field, VS, is added to mstatus[10:9] and shadowed in
  # sstatus[10:9]. It is defined analogously to the floating-point context status
  # field, FS.
  - name: mstatus-vs_op
    coverpoint: [""]

  # When mstatus.VS is set to Initial or Clean, executing any instruction that
  # changes vector state, including the vector CSRs, will change mstatus.VS to
  # Dirty. Implementations may also change mstatus.VS from Initial or Clean to Dirty
  # at any time, even when there is no change in vector state.
  - name: mstatus_vs_op_initial_clean
    coverpoint: [""]

  # When V=1, both vsstatus.VS and mstatus.VS are in effect: attempts to execute any
  # vector instruction, or to access the vector CSRs, raise an illegal-instruction
  # exception when either field is set to Off.
  - name: vsstatus-vs_mstatus_vs_op_off
    coverpoint: [""]

  # When the hypervisor extension is present, a vector context status field, VS, is
  # added to vsstatus[10:9]. It is defined analogously to the floating-point context
  # status field, FS.
  - names: [vsstatus_vs_sz, vsstatus_vs_acc]
    coverpoint: [""]

  # Attempts to execute any vector instruction, or to access the vector CSRs, raise
  # an illegal-instruction exception when mstatus.VS is set to Off.
  - name: mstatus_vs_op_off
    coverpoint: [""]

  # When V=1 and neither vsstatus.VS nor mstatus.VS is set to Off, executing any
  # instruction that changes vector state, including the vector CSRs, will change
  # both mstatus.VS and vsstatus.VS to Dirty.
  - name: mstatus_vs_op_active
    coverpoint: [""]

  # A vector context status field, VS, is added to mstatus[10:9] and shadowed in
  # sstatus[10:9]. It is defined analogously to the floating-point context status
  # field, FS.
  - name: sstatus_vs_op
    coverpoint: [""]

  # Similarly, when V=1, both vsstatus.VS and the HS-level sstatus.VS are in effect.
  # Attempts to execute a vector instruction when either field is 0 (Off) raise an
  # illegal-instruction exception. Modifying the vector state when V=1 causes both
  # fields to be set to 3 (Dirty).
  - name: vsstatus_vs_op2
    coverpoint: [""]

  # When V=1, both vsstatus.VS and mstatus.VS are in effect: attempts to execute any
  # vector instruction, or to access the vector CSRs, raise an illegal-instruction
  # exception when either field is set to Off.
  - name: vsstatus_vs_op_off
    coverpoint: [""]

  # When V=1 and neither vsstatus.VS nor mstatus.VS is set to Off, executing any
  # instruction that changes vector state, including the vector CSRs, will change
  # both mstatus.VS and vsstatus.VS to Dirty.
  - name: vsstatus_vs_op_active
    coverpoint: [""]

  # If vsstatus.VS is Dirty, vsstatus.SD is 1; otherwise, vsstatus.SD is set in
  # accordance with existing specifications.
  - name: vsstatus_sd_op_vs
    coverpoint: [""]

  # If mstatus.VS is Dirty, mstatus.SD is 1; otherwise, mstatus.SD is set in
  # accordance with existing specifications.
  - name: mstatus-sd_op
    coverpoint: [""]

  # If mstatus.VS is Dirty, mstatus.SD is 1; otherwise, mstatus.SD is set in
  # accordance with existing specifications.
  - name: mstatus_sd_op_vs
    coverpoint: [""]

  # Implementations may have a writable misa.V field.
  - name: mutable_misa_v
    coverpoint: [""]

  # Analogous to the way in which the floating-point unit is handled, the mstatus.VS
  # field may exist even if misa.V is clear.
  - name: mstatus_vs_exists
    coverpoint: [""]

  # For implementations with a writable misa.V field, the vsstatus.VS field may
  # exist even if misa.V is clear.
  - name: vsstatus_vs_exists
    coverpoint: [""]

  # The read-only XLEN-wide vector type CSR, vtype provides the default type used to
  # interpret the contents of the vector register file, and can only be updated by
  # vset{i}vl{i} instructions.
  - names: [vtype_sz, vtype_op]
    coverpoint: [""]

  # The vtype register has five fields, vill, vma, vta, vsew[2:0], and vlmul[2:0].
  # Bits vtype[XLEN-2:8] should be written with zero, and non-zero values in this
  # field are reserved.
  - names:
      [vtype_vill_sz, vtype_vma_sz, vtype_vta_sz, vtype_vsew_sz, vtype_vlmul_sz]
    coverpoint: [""]

  # The value in vsew sets the dynamic selected element width (SEW). By default, a
  # vector register is viewed as being divided into VLEN/SEW elements.
  - name: vtype_vsew_op
    coverpoint: [""]

  # While it is anticipated the larger vsew[2:0] encodings (100-111) will be used to
  # encode larger SEW, the encodings are formally reserved at this point.
  - name: vtype_vsew_rsv
    coverpoint: [""]

  # Implementations must support LMUL integer values of 1, 2, 4, and 8.
  - name: vtype_lmul_val
    coverpoint: [""]

  # Implementations must provide fractional LMUL settings that allow the narrowest
  # supported type to occupy a fraction of a vector register corresponding to the
  # ratio of the narrowest supported type&#8217;s width to that of the largest
  # supported type&#8217;s width. In general, the requirement is to support LMUL ≥
  # SEWMIN/ELEN, where SEWMIN is the narrowest supported SEW value and ELEN is the
  # widest supported SEW value. In the standard extensions, SEWMIN=8. For standard
  # vector extensions with ELEN=32, fractional LMULs of 1/2 and 1/4 must be
  # supported. For standard vector extensions with ELEN=64, fractional LMULs of 1/2,
  # 1/4, and 1/8 must be supported.
  - name: vtype_lmul_fval
    coverpoint: [""]

  # For a given supported fractional LMUL setting, implementations must support SEW
  # settings between SEWMIN and LMUL * ELEN, inclusive.
  - name: vtype_sew_val
    coverpoint: [""]

  # The use of vtype encodings with LMUL &lt; SEWMIN/ELEN is reserved, but
  # implementations can set vill if they do not support these configurations.
  - name: vtype_lmul_fval_rsv
    coverpoint: [""]

  # LMUL is set by the signed vlmul field in vtype (i.e., LMUL = 2vlmul[2:0]).
  - name: LMUL
    coverpoint: [""]

  # The derived value VLMAX = LMUL*VLEN/SEW represents the maximum number of
  # elements that can be operated on with a single vector instruction given the
  # current SEW and LMUL settings as shown in the table below.
  - name: VLMAX
    coverpoint: [""]

  # Instructions specifying an LMUL=2 vector register group with an odd-numbered
  # vector register are reserved.
  - name: vreg_offgroup_LMUL2_rsv
    coverpoint: [""]

  # instructions specifying an LMUL=4 vector register group using vector register
  # numbers that are not multiples of four are reserved.
  - name: vreg_offgroup_LMUL4_rsv
    coverpoint: [""]

  # instructions specifying an LMUL=8 vector register group using register numbers
  # that are not multiples of eight are reserved.
  - name: vreg_offgroup_LMUL8_rsv
    coverpoint: [""]

  # Mask registers are always contained in a single vector register, regardless of
  # LMUL.
  - name: vreg_mask_LMUL_indp
    coverpoint: [""]

  # These two bits modify the behavior of destination tail elements and destination
  # inactive masked-off elements respectively during the execution of vector
  # instructions. The tail and inactive sets contain element positions that are not
  # receiving new results during a vector operation, as defined in .
  - name: vtype_vta_op
    coverpoint: [""]

  # These two bits modify the behavior of destination tail elements and destination
  # inactive masked-off elements respectively during the execution of vector
  # instructions. The tail and inactive sets contain element positions that are not
  # receiving new results during a vector operation, as defined in .
  - name: vtype_vma_op
    coverpoint: [""]

  # All systems must support all four options:
  - names: [vtype_vta_val, vtype_vma_val]
    coverpoint: [""]

  # Mask destination tail elements are always treated as tail-agnostic, regardless
  # of the setting of vta.
  - name: vreg_mask_tail_agn
    coverpoint: [""]

  # When a set is marked undisturbed, the corresponding set of destination elements
  # in a vector register group retain the value they previously held.
  - name: vreg_mask_op
    coverpoint: [""]

  # When a set is marked agnostic, the corresponding set of destination elements in
  # any vector destination operand can either retain the value they previously held,
  # or are overwritten with 1s. Within a single vector instruction, each destination
  # element can be either left undisturbed or overwritten with 1s, in any
  # combination, and the pattern of undisturbed or overwritten with 1s is not
  # required to be deterministic when the instruction is executed with the same
  # inputs.
  - name: vreg_agnostic_op
    coverpoint: [""]

  # In addition, except for mask load instructions, any element in the tail of a
  # mask result can also be written with the value the mask-producing operation
  # would have calculated with vl=VLMAX. Furthermore, for mask-logical instructions
  # and vmsbf.m, vmsif.m, vmsof.m mask-manipulation instructions, any element in the
  # tail of the result can be written with the value the mask-producing operation
  # would have calculated with vl=VLEN, SEW=8, and LMUL=8 (i.e., all bits of the
  # mask register can be overwritten).
  - name: vreg_mask_tail_op
    coverpoint: [""]

  # If the vill bit is set, then any attempt to execute a vector instruction that
  # depends upon vtype will raise an illegal-instruction exception.
  - name: vtype_vill_op
    coverpoint: [""]

  # The XLEN-bit-wide read-only vl CSR can only be updated by the vset{i}vl{i}
  # instructions, and the fault-only-first vector load instruction variants.
  - name: vl_acc
    coverpoint: [""]

  # The vl register holds an unsigned integer specifying the number of elements to
  # be updated with results from a vector instruction, as further detailed in .
  - name: vl_op
    coverpoint: [""]

  # The XLEN-bit-wide read-only CSR vlenb holds the value VLEN/8, i.e., the vector
  # register length in bytes.
  - names: [vlenb_op, vlenb_acc]
    coverpoint: [""]

  # The XLEN-bit-wide read-write vstart CSR specifies the index of the first element
  # to be executed by a vector instruction, as described in .
  - names: [vstart_acc, vstart_sz]
    coverpoint: [""]

  # All vector instructions are defined to begin execution with the element number
  # given in the vstart CSR, leaving earlier elements in the destination vector
  # undisturbed
  - name: vstart_op
    coverpoint: [""]

  # reset the vstart CSR to zero at the end of execution.
  - name: vstart_update
    coverpoint: [""]

  # vstart is not modified by vector instructions that raise illegal-instruction
  # exceptions.
  - name: vstart_unmodified
    coverpoint: [""]

  # The vstart CSR is defined to have only enough writable bits to hold the largest
  # element index (one less than the maximum VLMAX).
  - name: vstart_sz_writable
    coverpoint: [""]

  # The use of vstart values greater than the largest element index for the current
  # vtype setting is reserved.
  - name: vstart_val_rsv
    coverpoint: [""]

  # Implementations are permitted to raise illegal-instruction exceptions when
  # attempting to execute a vector instruction with a value of vstart that the
  # implementation can never produce when executing that same instruction with the
  # same vtype setting.
  - name: vstart_vtype_dep
    coverpoint: [""]

  # The vector fixed-point rounding-mode register holds a two-bit read-write
  # rounding-mode field in the least-significant bits (vxrm[1:0]). The upper bits,
  # vxrm[XLEN-1:2], should be written as zeros.
  - names: [vxrm_acc, vxrm_sz, vxrm_val]
    coverpoint: [""]

  # The vector fixed-point rounding-mode is given a separate CSR address to allow
  # independent access, but is also reflected as a field in vcsr.
  - name: vcsr_vxrm_op
    coverpoint: [""]

  # The fixed-point rounding algorithm is specified as follows. Suppose the
  # pre-rounding result is v, and d bits of that result are to be rounded off. Then
  # the rounded result is (v &gt;&gt; d) + r, where r depends on the rounding mode
  # as specified in the following table.
  - name: vxrm_op
    coverpoint: [""]

  # The vxsat CSR has a single read-write least-significant bit (vxsat[0]) that
  # indicates if a fixed-point instruction has had to saturate an output value to
  # fit into a destination format. Bits vxsat[XLEN-1:1] should be written as zeros.
  - names: [vxsat_op, vxsat_acc, vxsat_sz]
    coverpoint: [""]

  # The vxsat bit is mirrored in vcsr.
  - name: vcsr_vxsat_op
    coverpoint: [""]

  # The vxrm and vxsat separate CSRs can also be accessed via fields in the
  # XLEN-bit-wide vector control and status CSR, vcsr.
  - names: [vcsr_vxsat_acc, vcsr_vxrm_acc]
    coverpoint: [""]

  # When LMUL=1, elements are simply packed in order from the least-significant to
  # most-significant bits of the vector register.
  - name: vreg_lmul1_op
    coverpoint: [""]

  # When LMUL &lt; 1, only the first LMUL*VLEN/SEW elements in the vector register
  # are used. The remaining space in the vector register is treated as part of the
  # tail, and hence must obey the vta setting.
  - name: vreg_flmul_op
    coverpoint: [""]

  # When vector registers are grouped, the elements of the vector register group are
  # packed contiguously in element order beginning with the lowest-numbered vector
  # register and moving to the next-highest-numbered vector register in the group
  # once each vector register is filled.
  - name: vreg_lmulge2_op
    coverpoint: [""]

  # A vector mask occupies only one vector register regardless of SEW and LMUL.
  - name: vreg_mask_vtype_indp
    coverpoint: [""]

  # Each element is allocated a single mask bit in a mask vector register. The mask
  # bit for element i is located in bit i of the mask register, independent of SEW
  # or LMUL.
  - name: vreg_mask_sz
    coverpoint: [""]

  # Any vector register can be used to hold a scalar regardless of the current LMUL
  # setting.
  - name: vreg_scalar_lmul_indp
    coverpoint: [""]

  # Each vector operand has an effective element width (EEW) and an effective LMUL
  # (EMUL) that is used to determine the size and location of all the elements
  # within a vector register group. By default, for most operands of most
  # instructions, EEW=SEW and EMUL=LMUL.
  - name: EEW
    coverpoint: [""]

  # Each vector operand has an effective element width (EEW) and an effective LMUL
  # (EMUL) that is used to determine the size and location of all the elements
  # within a vector register group. By default, for most operands of most
  # instructions, EEW=SEW and EMUL=LMUL.
  - name: EMUL
    coverpoint: [""]

  # EEW/EMUL = SEW/LMUL.
  - name: EMUL_SEW_LMUL_dep
    coverpoint: [""]

  # EEW/EMUL = SEW/LMUL.
  - name: EEW_SEW_LMUL_dep
    coverpoint: [""]

  # Narrowing instructions have a source operand that has EEW=2*SEW and EMUL=2*LMUL
  # but with a destination where EEW=SEW and EMUL=LMUL.
  - name: vnarrowing_EEW
    coverpoint: [""]

  # Narrowing instructions have a source operand that has EEW=2*SEW and EMUL=2*LMUL
  # but with a destination where EEW=SEW and EMUL=LMUL.
  - name: vnarrowing_EMUL
    coverpoint: [""]

  # Using other than the lowest-numbered vector register to specify a vector
  # register group is a reserved encoding.
  - name: EMUL_offgroup_rsv
    coverpoint: [""]

  # A vector register cannot be used to provide source operands with more than one
  # EEW for a single instruction. A mask register source is considered to have EEW=1
  # for this constraint. An encoding that would result in the same vector register
  # being read with two or more different EEWs, including when the vector register
  # appears at different positions within two or more vector register groups, is
  # reserved.
  - name: vreg_source_EEW_rsv
    coverpoint: [""]

  # A destination vector register group can overlap a source vector register group
  # only if one of the following holds:
  - name: vreg_overlap_legal
    coverpoint: [""]

  # For the purpose of determining register group overlap constraints, mask elements
  # have EEW=1.
  - name: vreg_mask_overlap
    coverpoint: [""]

  # Any instruction encoding that violates the overlap constraints is reserved.
  - name: vreg_overlap_rsv
    coverpoint: [""]

  # When source and destination registers overlap and have different EEW, the
  # instruction is mask- and tail-agnostic, regardless of the setting of the vta and
  # vma bits in vtype.
  - name: vreg_overlap_agn
    coverpoint: [""]

  # The largest vector register group used by an instruction can not be greater than
  # 8 vector registers (i.e., EMUL≤8), and if a vector instruction would require
  # greater than 8 vector registers in a group, the instruction encoding is
  # reserved. For example, a widening operation that produces a widened vector
  # register group result when LMUL=8 is reserved as this would imply a result
  # EMUL=16.
  - name: EMUL_rsv
    coverpoint: [""]

  # Widened scalar values, e.g., input and output to a widening reduction operation,
  # are held in the first element of a vector register and have EMUL=1.
  - name: vreg_scalar_EMUL
    coverpoint: [""]

  # Element operations that are masked off (inactive) never generate exceptions. The
  # destination vector register elements corresponding to masked-off elements are
  # handled with either a mask-undisturbed or mask-agnostic policy depending on the
  # setting of the vma bit in vtype Where available, masking is encoded in a
  # single-bit vm field in the instruction (inst[25]).
  - name: vmask_op
    coverpoint: [""]

  # The mask value used to control execution of a masked vector instruction is
  # always supplied by vector register v0.
  - name: vreg_vmask
    coverpoint: [""]

  # The destination vector register group for a masked vector instruction cannot
  # overlap the source mask register (v0), unless the destination vector register is
  # being written with a mask value (e.g., compares) or the scalar result of a
  # reduction. These instruction encodings are reserved.
  - name: vreg_vmask_rsv
    coverpoint: [""]

  # When vstart ≥ vl, there are no body elements, and no elements are updated in any
  # destination vector register group, including that no tail elements are updated
  # with agnostic values.
  - name: vstart_vl_dep
    coverpoint: [""]

  # Instructions that write an x register or f register do so even when vstart ≥ vl,
  # including when vl=0.
  - name: vstart_vl_scalar_indp
    coverpoint: [""]

  # The prestart elements do not raise exceptions and do not update the destination
  # vector register.
  - name: vector_prestart_element
    coverpoint: [""]

  # The inactive elements do not raise exceptions and do not update any destination
  # vector register group unless masked agnostic is specified (vtype.vma=1), in
  # which case inactive elements may be overwritten with 1s.
  - name: vector_inactive_element
    coverpoint: [""]

  # The tail elements do not raise exceptions, and do not update any destination
  # vector register group unless tail agnostic is specified (vtype.vta=1), in which
  # case tail elements may be overwritten with 1s, or with the result of the
  # instruction in the case of mask-producing instructions except for mask loads.
  # When LMUL &lt; 1, the tail includes the elements past VLMAX that are held in the
  # same vector register.
  - name: vector_tail_element
    coverpoint: [""]

  # The vset{i}vl{i} instructions set the vtype and vl CSRs based on their
  # arguments, and write the new value of vl into rd.
  - name: vset_op
    coverpoint: [""]

  # the vl register is also set to zero.
  - name: vtype_vstart_op
    coverpoint: [""]

  # The new vtype value is encoded in the immediate fields of vsetvli and vsetivli,
  # and in the rs2 register for vsetvl. The read-only XLEN-wide vector type CSR,
  # vtype provides the default type used to interpret the contents of the vector
  # register file, and can only be updated by vset{i}vl{i} instructions.
  - name: vtype_acc
    coverpoint: [""]

  # If the vtype value is not supported by the implementation, then the vill bit is
  # set in vtype, the remaining bits in vtype are set to zero A vtype value with
  # vill set is treated as an unsupported configuration. Implementations must
  # consider all bits of the vtype value to determine if the configuration is
  # supported. An unsupported value in any location within the vtype value must
  # result in vill being set.
  - name: vtype_vill_set
    coverpoint: [""]

  # When rs1 is not x0, the AVL is an unsigned integer held in the x register
  # specified by rs1, and the new vl value is also written to the x register
  # specified by rd. When rs1=x0 but rd≠x0, the maximum unsigned integer value (~0)
  # is used as the AVL, and the resulting VLMAX is written to vl and also to the x
  # register specified by rd. When rs1=x0 and rd=x0, the instructions operate as if
  # the current vector length in vl is used as the AVL, and the resulting value is
  # written to vl, but not to a destination register. This form can only be used
  # when VLMAX and hence vl is not actually changed by the new SEW/LMUL ratio.
  - name: vsetvl_op
    coverpoint: [""]

  # Use of the instructions with a new SEW/LMUL ratio that would result in a change
  # of VLMAX is reserved. Use of the instructions is also reserved if vill was 1
  # beforehand.
  - name: vtype_vset_rsv
    coverpoint: [""]

  # For the vsetivli instruction, the AVL is encoded as a 5-bit zero-extended
  # immediate (0&#8212;&#8203;31) in the rs1 field.
  - name: vsetivli_op
    coverpoint: [""]

  # The vset{i}vl{i} instructions first set VLMAX according to their vtype argument,
  # then set vl obeying the following constraints: vl = AVL if AVL ≤ VLMAX ceil(AVL
  # / 2) ≤ vl ≤ VLMAX if AVL &lt; (2 * VLMAX) vl = VLMAX if AVL ≥ (2 * VLMAX)
  # Deterministic on any given implementation for same input AVL and VLMAX values
  # These specific properties follow from the prior rules: vl = 0 if AVL = 0 vl &gt;
  # 0 if AVL &gt; 0 vl ≤ VLMAX vl ≤ AVL a value read from vl when used as the AVL
  # argument to vset{i}vl{i} results in the same value in vl, provided the resultant
  # VLMAX equals the value of VLMAX at the time that vl was read
  - name: vl_val
    coverpoint: [""]

  # All vector loads and stores may generate and accept a non-zero vstart value.
  - name: vector_ls_vstart
    coverpoint: [""]

  # Vector load/store base registers and strides are taken from the GPR x registers.
  - name: vector_ls_base_stride_regtype
    coverpoint: [""]

  # The base effective address for all vector accesses is given by the contents of
  # the x register named in rs1.
  - name: vector_ls_base
    coverpoint: [""]

  # Vector unit-stride operations access elements stored contiguously in memory
  # starting from the base effective address.
  - name: vector_ls_unit_stride_op
    coverpoint: [""]

  # Vector constant-stride operations access the first memory element at the base
  # effective address, and then access subsequent elements at address increments
  # given by the byte offset contained in the x register specified by rs2.
  - name: vector_ls_constant_stride_op
    coverpoint: [""]

  # Vector memory unit-stride and constant-stride operations directly encode EEW of
  # the data to be transferred statically in the instruction to reduce the number of
  # vtype changes when accessing memory in a mixed-width routine.
  - name: vector_ls_strided_EEW
    coverpoint: [""]

  # For loads, the vd register will hold the first field loaded from the segment.
  # For stores, the vs3 register is read to provide the first field to be stored to
  # each segment.
  - name: vector_ls_seg_unit_stride_vd_vs3
    coverpoint: [""]

  # Support for misaligned vector memory accesses is independent of an
  # implementation&#8217;s support for misaligned scalar memory accesses.
  - name: vector_ls_scalar_missaligned_independence
    coverpoint: [""]

  # Vector misaligned memory accesses follow the same rules for atomicity as scalar
  # misaligned memory accesses.
  - name: vector_ls_scalar_missaligned_dependence
    coverpoint: [""]

  # However, even for the ordered form, accesses to the fields within an individual
  # segment are not ordered with respect to each other.
  - name: vector_ls_seg_indexed_unordered
    coverpoint: [""]

  # If element 0 raises an exception, vl is not modified, and the trap is taken. If
  # an element &gt; 0 raises an exception, the corresponding trap is not taken, and
  # the vector length vl is reduced to the index of the element that would have
  # raised an exception.
  - name: vector_ff_op
    coverpoint: [""]

  # Vector indexed operations add the contents of each element of the vector offset
  # operand specified by vs2 to the base effective address to give the effective
  # address of each element. The data vector register group has EEW=SEW, EMUL=LMUL,
  # while the offset vector register group has EEW encoded in the instruction and
