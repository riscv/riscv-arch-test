  # The Zvfh extension depends on the Zve32f and Zfhmin extensions.
  - name: Zvfh_dependent_Zve32f_Zfhmin
    coverpoint: [""]

  # Vector instructions with EGS &gt; VLMAX are reserved.
  - name: egs_ge_vlmax_rsv
    coverpoint: [""]

  # When an operand is a vector of element groups, the vl setting must correspond to
  # an integer multiple of the element group size, with other values of vl reserved.
  - name: egs_vl_rsv
    coverpoint: [""]

  # When element group instructions are present, an additional constraint is placed
  # on the setting of vl based on an AVL value (augmenting
  # &lt;&lt;constraints-on-setting-vl&gt;&gt;). EGSMAX is the largest EGS supported
  # by the implementation. When AVL &gt; VLMAX, the value of vl must be set to
  # either VLMAX or a positive integer multiple of EGSMAX.
  - name: egs_vl_avl
    coverpoint: [""]

  # The vtype SEW can be used to indicate or calculate the effective element size
  # (EEW) of one or more operands of an element group instruction. Where the operand
  # is an element group, SEW and EEW refer to the number of bits in each individual
  # element within a group not the number of bits in the group as a whole.
  - name: egs_sew_eew
    coverpoint: [""]

  # The vtype LMUL setting can be used to indicate or calculate the effective length
  # multiplier (EMUL) for one or more operands. Element group instructions tend to
  # exhibit a much wider range of relationships between various operand EEW/EMUL
  # values. For example, an instruction might take a vector of length N of 4-element
  # groups with EEW=8b and reduce each group to produce a vector length N of
  # 1-element groups with EEW=32b. In this case, the input and output EMUL values
  # are equal even though the EEW settings differ by a factor of 4.
  - name: egs_lmul_emul
    coverpoint: [""]

  # The element group width (EGW) is the number of bits in the element group as a
  # whole. For example, the SHA-256 instructions in the Zvknha extension operate on
  # an EGW of 128, with EGS=4 and EEW=32. It is possible to use LMUL to concatenate
  # multiple vector registers together to support larger EGW&gt;VLEN.
  - name: egs_egw
    coverpoint: [""]

  # The active elements can raise exceptions and update the destination vector
  # register group.
  - name: vector_active_element
    coverpoint: [""]

  # If the Ztso extension is implemented, vector memory instructions additionally
  # follow RVTSO at the instruction level.
  - name: vector_ls_rvtso
    coverpoint: [""]

  # For vnclipu/vnclip, the rounding mode is specified in the vxrm CSR. Rounding
  # occurs around the least-significant bit of the destination and before
  # saturation.
  - name: vnclipu_vnclip_rounding
    coverpoint: [""]

  # Vector floating-point instructions require the presence of base scalar
  # floating-point extensions corresponding to the supported vector floating-point
  # element widths.
  - name: Vf_requrires_Vx
    coverpoint: [""]

  # so these instructions all operate on single vector registers regardless of the
  # setting of the vlmul field in vtype. They do not change the value of vlmul.
  - name: instrgrp_vmask_disregard_vlmul
    coverpoint: [""]

  # execution is always restarted from the beginning when resuming after a trap
  # handler.
  - name: viota_restart
    coverpoint: [""]

  # vrgather.vv vd, vs2, vs1, vm # vd[i] = (vs1[i] &gt;= VLMAX) ? 0 : vs2[vs1[i]];
  # vrgatherei16.vv vd, vs2, vs1, vm # vd[i] = (vs1[i] &gt;= VLMAX) ? 0 :
  # vs2[vs1[i]];
  - name: vrgather-vv_op_vrgatherei16-vv_op
    coverpoint: [""]
