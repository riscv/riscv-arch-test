    # the instruction, or a dynamic rounding mode held in frm. Rounding
    # modes are encoded as shown in &lt;&lt;norm:dyn_round_enc&gt;&gt;. A value of 111 in the
    # instruction's rm field selects the dynamic rounding mode held in
    # frm
    coverpoint:
      [
        "F_fdiv_s_cg/{cp_fs1, cp_fs2, cp_fd, cp_frm_3, cp_csr_fflags_vdoun, cp_csr_frm, cr_fs1_fs2_edges_frm}",
      ]
  - name: feq-s_op
    # Floating-point compare instructions (FEQ.S, FLT.S, FLE.S) perform the specified comparison between floating-point registers (rs1 = rs2, rs1 &lt; rs2, rs1 ≤ rs2) writing 1 to the integer register rd if the condition holds, and 0 otherwise.
    coverpoint:
      ["F_feq_s_cg/{cp_rd, cp_fs1, cp_fs2, cp_csr_fflags_v, cr_fs1_fs2_edges}"]
  - name: fle-s_op
    # Floating-point compare instructions (FEQ.S, FLT.S, FLE.S) perform the specified comparison between floating-point registers (rs1 = rs2, rs1 &lt; rs2, rs1 ≤ rs2) writing 1 to the integer register rd if the condition holds, and 0 otherwise.
    coverpoint:
      ["F_fle_s_cg/{cp_rd, cp_fs1, cp_fs2, cp_csr_fflags_v, cr_fs1_fs2_edges}"]
  - name: flt-s_op
    # Floating-point compare instructions (FEQ.S, FLT.S, FLE.S) perform the specified comparison between floating-point registers (rs1 = rs2, rs1 &lt; rs2, rs1 ≤ rs2) writing 1 to the integer register rd if the condition holds, and 0 otherwise.
    coverpoint:
      ["F_flt_s_cg/{cp_rd, cp_fs1, cp_fs2, cp_csr_fflags_v, cr_fs1_fs2_edges}"]
  - name: flw_op
    # Floating-point loads and stores use the same base+offset addressing mode as the integer base ISAs, with a base address in register rs1 and a 12-bit signed byte offset. The FLW instruction loads a single-precision floating-point value from memory into floating-point register rd. FSW stores a single-precision value from floating-point register rs2 to memory.
    coverpoint: ["F_flw_cg/{cp_rs1_nx0, cp_imm_edges, cp_fd}"]
  - name: fmadd-s_op
    # FMADD.S multiplies the values in rs1 and rs2, adds the value in rs3, and writes the final result to rd. FMADD.S computes (rs1×rs2)+rs3.
    # Floating-point fused multiply-add instructions require a new standard instruction format. R4-type instructions specify three source registers (rs1, rs2, and rs3) and a destination register (rd). This format is only used by the floating-point fused multiply-add instructions.
    # The 2-bit floating-point format field fmt is encoded as shown in . It is set to S (00) for all instructions in the F extension.
    # The fused multiply-add instructions must set the invalid operation exception flag when the multiplicands are ∞ and zero, even when the addend is a quiet NaN.
    # Operations on subnormal numbers are handled in accordance with the IEEE 754-2008 standard.
    # In the parlance of the IEEE standard, tininess is detected after rounding.
    # Rounding Mode|Mnemonic|Meaning
    # ===
    # 000|RNE|Round to Nearest, ties to Even¶001|RTZ|Round towards Zero¶010|RDN|Round Down (towards −∞)¶011|RUP|Round Up (towards +∞)¶100|RMM|Round to Nearest, ties to Max Magnitude¶101||Reserved for future use.¶110||Reserved for future use.¶111|DYN|In instruction&#8217;s rm field, selects dynamic rounding mode; In Rounding Mode register, reserved.
    # ===
    # Floating-point operations use either a static rounding mode encoded in
    # the instruction, or a dynamic rounding mode held in frm. Rounding
    # modes are encoded as shown in &lt;&lt;norm:dyn_round_enc&gt;&gt;. A value of 111 in the
    # instruction's rm field selects the dynamic rounding mode held in
    # frm
    coverpoint:
      [
        "F_fmadd_s_cg/{cp_fs1, cp_fs2, cp_fs3, cp_fd, cp_frm_4, cp_csr_fflags_voun, cp_csr_frm, cr_fs1_fs2_edges_frm4, cr_fs1_fs3_edges_frm4}",
      ]
  - name: fmax-s_op
    # Floating-point minimum-number and maximum-number instructions FMIN.S and FMAX.S write, respectively, the smaller or larger of rs1 and rs2 to rd
    coverpoint:
      ["F_fmax_s_cg/{cp_fs1, cp_fs2, cp_fd, cp_csr_fflags_v, cr_fs1_fs2_edges}"]
  - name: fmin-s_op
    # Floating-point minimum-number and maximum-number instructions FMIN.S and FMAX.S write, respectively, the smaller or larger of rs1 and rs2 to rd
    coverpoint:
