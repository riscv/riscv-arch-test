normative_rule_definitions:
  # When TW=0, the WFI instruction may execute in modes less privileged than M when
  # not prevented for some other reason. When TW=1, then if WFI is executed in any
  # less-privileged mode, and it does not complete within an
  # implementation-specific, bounded time limit, the WFI instruction causes an
  # illegal-instruction exception.
  - name: mstatus_tw_time_limit
    coverpoint: [""]

  # An implementation may have WFI always raise an illegal-instruction exception in
  # modes less privileged than M when TW=1, even if there are pending
  # globally-disabled interrupts when the instruction is executed.
  - name: mstatus_tw_always_illegal
    coverpoint: [""]
