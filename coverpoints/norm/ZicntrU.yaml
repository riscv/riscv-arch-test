normative_rule_definitions:
  # The counter-enable mcounteren register is a 32-bit register
  - name: mcounteren_sz
    coverpoint: ["Sm_mcsr_cg/cp_mcsr_access/mcounteren"]

  # controls the availability of the hardware performance-monitoring counters to the
  # next-lower privileged mode.
  - name: mcounteren_op
    coverpoint:
      [
        "ZicntrS_cg/cp_mcounteren_access_s, ZicntrU_cg/cp_mcounteren_access_u, ZicntrH_cg/cp_mcounteren_access_vs",
      ]

  # The settings in this register only control accessibility. The act of reading or
  # writing this register does not affect the underlying counters, which continue to
  # increment even when not accessible.
  - name: mcounteren_inc_inaccessible
    coverpoint: ["TODO"]

  - name: mcounteren_enc
    coverpoint: ["Sm_mcsr_cg/cp_mcsr_access/mcounteren"]

  # When the CY, TM, IR, or HPMn bit in the mcounteren register is clear, attempts
  # to read the cycle, time, instret, or hpmcountern register while executing in
  # S-mode or U-mode will cause an illegal-instruction exception.
  - name: mcounteren_clr_ill_inst_exc
    coverpoint:
      ["ZicntrS_cg/cp_mcounteren_access_s, ZicntrU_cg/cp_mcounteren_access_u"]

  # When one of these bits is set, access to the corresponding register is permitted
  # in the next implemented privilege mode (S-mode if implemented, otherwise
  # U-mode).
  - name: mcounteren_set_nxt_priv
    coverpoint:
      ["ZicntrS_cg/cp_mcounteren_access_s, ZicntrU_cg/cp_mcounteren_access_u"]

  # In harts with U-mode, the mcounteren must be implemented, but all fields are
  # WARL
  - names: [mcounteren_flds_mandatory, mcounteren_flds_warl]
    coverpoint: ["Sm_mcsr_cg/cp_mcsr_access/mcounteren"]
