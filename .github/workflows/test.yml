# This is a basic workflow to help you get started with Actions

name: CI test

# Controls when the action will run.
on:

  # Triggers the workflow on pull request events but only for the main & dev branch
  pull_request:
    branches: [ '**'  ]

  # Triggers the workflow on push events
  push:
    branches: [ '**'  ]

  # Allows you to run this workflow Actions manually
  workflow_dispatch:

   # Triggers the action 2am every day
  schedule:
    - cron: "0 2 * * *"


# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  ACT-sail-spike:
    name: ACT-sail-spike (RV${{ matrix.xlen }})
    runs-on: ubuntu-22.04
    # Set a 60-minute time limit for this job
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        xlen: [32, 64]

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv
          sudo apt-get install -y gcc git autoconf automake libtool curl make unzip
          sudo apt-get install -y autoconf automake autotools-dev curl python3 python3-pip libmpc-dev libmpfr-dev libgmp-dev gawk build-essential bison flex texinfo gperf libtool patchutils bc zlib1g-dev libexpat-dev ninja-build git cmake libglib2.0-dev libslirp-dev pkg-config
          sudo apt-get install -y device-tree-compiler libboost-regex-dev libboost-system-dev

      - name: Build RISCV-GNU Toolchain (${{ matrix.xlen }} bit)
        run: |
          wget -c https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2024.09.03/riscv${{ matrix.xlen }}-elf-ubuntu-20.04-gcc-nightly-2024.09.03-nightly.tar.gz
          tar -xzf riscv${{ matrix.xlen }}-elf-ubuntu-20.04-gcc-nightly-2024.09.03-nightly.tar.gz
          mv riscv riscv${{ matrix.xlen }}
          echo $GITHUB_WORKSPACE/riscv${{ matrix.xlen }}/bin >> $GITHUB_PATH

      - name: Install latest riscof
        run: |
          git clone https://github.com/riscv-software-src/riscof.git
          cd riscof
          pip3 install --editable .

      - name: Install latest riscv-config
        run: |
          git clone https://github.com/riscv-software-src/riscv-config.git
          cd riscv-config
          pip3 install --editable .

      - name: Install riscv-isac
        run: |
          cd riscv-isac
          pip3 install --editable .

      - name: Install riscv-ctg
        run: |
          cd riscv-ctg
          pip3 install --editable .

      - name: Get Latest Spike Commit
        run: |
              SPIKE_HASH=$(git ls-remote https://github.com/riscv/riscv-isa-sim.git HEAD | awk '{ print $1}')
              echo "SPIKE_HASH=$SPIKE_HASH" >> "$GITHUB_ENV"

      - name: Restore cached Spike
        id: cache-spike-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/spike
          key: spike-${{ env.SPIKE_HASH }}-RV${{ matrix.xlen }}

      - name: Install Spike
        if: steps.cache-spike-restore.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/riscv/riscv-isa-sim.git
          cd riscv-isa-sim
          mkdir build
          cd build
          ../configure --prefix=$GITHUB_WORKSPACE/spike
          make -j$(nproc)
          make install

      - name: Save cached Spike
        if: steps.cache-spike-restore.outputs.cache-hit != 'true'
        id: cache-spike-save
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/spike
          key: ${{ steps.cache-spike-restore.outputs.cache-primary-key }}

      - name: Get Latest Sail Commit
        run: |
              SAIL_HASH=$(git ls-remote https://github.com/riscv/sail-riscv.git HEAD | awk '{ print $1}')
              echo "SAIL_HASH=$SAIL_HASH" >> "$GITHUB_ENV"

      - name: Restore cached Sail
        id: cache-sail-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/sail
          key: sail-${{ env.SAIL_HASH }}-RV${{ matrix.xlen }}

      - name: Install Sail
        if: steps.cache-sail-restore.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /usr/local
          curl --location https://github.com/rems-project/sail/releases/download/0.19-linux-binary/sail.tar.gz | sudo tar xvz --directory=/usr/local --strip-components=1
          git clone https://github.com/riscv/sail-riscv.git
          cd sail-riscv
          cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -GNinja
          cmake --build build
          mkdir -p $GITHUB_WORKSPACE/sail
          mv build/c_emulator/riscv_sim_rv${{ matrix.xlen }}d $GITHUB_WORKSPACE/sail/riscv_sim_rv${{ matrix.xlen }}d

      - name: Save cached Sail
        if: steps.cache-sail-restore.outputs.cache-hit != 'true'
        id: cache-sail-save
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/sail
          key: ${{ steps.cache-sail-restore.outputs.cache-primary-key }}

      - name: Set PATH
        run: |
              echo $GITHUB_WORKSPACE/spike/bin >> $GITHUB_PATH
              echo $GITHUB_WORKSPACE/sail >> $GITHUB_PATH

      - name: Config and run riscof for RV${{ matrix.xlen }}
        run: |
          cd riscof-plugins/rv${{ matrix.xlen }}
          riscof run --config config.ini --suite ../../riscv-test-suite/rv${{ matrix.xlen }}i_m/I --env ../../riscv-test-suite/env --no-browser

      - name: Config and check coverage riscof for RV${{ matrix.xlen }}
        run: |
          cd riscof-plugins/rv${{ matrix.xlen }}
          mkdir -p complete_coverage
          combined_file="combined_coverage.md"
          first_file=1

          declare -A EXT_CGF_MAP=(
            ["I"]="i/rv${{ matrix.xlen }}i.cgf"
            ["M"]="m/rv${{ matrix.xlen }}im.cgf"
          )

          for EXT in "${!EXT_CGF_MAP[@]}"; do
            echo "Running coverage for extension: $EXT"
            riscof coverage --config=config.ini \
              --cgf-file ../../coverage/dataset.cgf \
              --cgf-file ../../coverage/${EXT_CGF_MAP[$EXT]} \
              --suite ../../riscv-test-suite/rv${{ matrix.xlen }}i_m/$EXT \
              --env ../../riscv-test-suite/env \
              -h ../../coverage/header_file.yaml --no-browser

            [ -d riscof_work ] && echo "riscof_work for rv${{ matrix.xlen }}i_m/$EXT exists" || echo "riscof_work for ${{ matrix.xlen }}i_m/$EXT missing"

            # Copy the entire folder to complete_coverage with a unique name based on the extension
            cp -r riscof_work complete_coverage/riscof_work_${EXT}

            if [ "$first_file" -eq 1 ]; then
              cat riscof_work/coverage.md > $combined_file
              first_file=0
            else
              tail -n +3 riscof_work/coverage.md >> $combined_file
            fi
          done

          echo -e "\n\nCombined Coverage Table:\n"
          tail -n +2 $combined_file | column -t -s '|' | sed 's/^/|/' | sed 's/$/|/'

      - name: Upload complete coverage folder for rv${{ matrix.xlen }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-coverage-rv${{ matrix.xlen }}
          path: ${{ github.workspace }}/riscof-plugins/rv${{ matrix.xlen }}/complete_coverage
          compression-level: 6
          overwrite: true

      #Check the existance of the run riscof work folder, and add the PATH to environment variable
      - name: Check size and determine riscof run command upload path
        if: always()
        id: check_size_run
        run: |
          work_folder="${{ github.workspace }}/riscof-plugins/rv${{ matrix.xlen }}/riscof_work/"
          run_report_file="$work_folder/report.html"

          if [ -d "$work_folder" ]; then
            folder_size=$(du -sm "$work_folder" | cut -f1)
            echo "Folder size: ${folder_size} MB"
            if [ "$folder_size" -gt 10000 ]; then
              echo "Size exceeds 10 GB. Checking if report exists."
              if [ -f "$run_report_file" ]; then
                echo "Uploading RISCOF generated report only."
                echo "run_upload_path=$run_report_file" >> $GITHUB_ENV
              else
                echo "No report found. Skipping upload."
                echo "run_upload_path=" >> $GITHUB_ENV
              fi
            else
              echo "Size is within limit. Uploading complete RISCOF_WORK Folder."
              echo "run_upload_path=$work_folder" >> $GITHUB_ENV
            fi
          else
            echo "Folder does not exist. Skipping upload."
            echo "run_upload_path=" >> $GITHUB_ENV
          fi

      #Check the existance of the coverage riscof work folder, and add the PATH to environment variable
      - name: Check size and determine riscof coverage upload path
        if: always()
        id: check_size_coverage
        run: |
          coverage_folder="${{ github.workspace }}/riscof-plugins/rv${{ matrix.xlen }}/complete_coverage"

          if [ -d "$coverage_folder" ]; then
          coverage_size=$(du -sm "$coverage_folder" | cut -f1)
          echo "Complete coverage folder size: ${coverage_size} MB"
          if [ "$coverage_size" -gt 10000 ]; then
            echo "Coverage folder too large, skipping upload."
            echo "coverage_upload_path=" >> $GITHUB_ENV
          else
            echo "Coverage folder is within limit. Will upload."
            echo "coverage_upload_path=$coverage_folder" >> $GITHUB_ENV
          fi
          else
            echo "Complete coverage folder does not exist. Skipping upload."
            echo "coverage_upload_path=" >> $GITHUB_ENV
          fi

      # Upload riscof work/report artifact
      - name: Upload riscof artifact for rv${{ matrix.xlen }}
        if: always() && env.run_upload_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: riscof-artifact-rv${{ matrix.xlen }}
          path: ${{ env.run_upload_path }}
          compression-level: 6
          overwrite: true

      # Upload complete_coverage folder if present
      - name: Upload complete coverage artifact for rv${{ matrix.xlen }}
        if: always() && env.coverage_upload_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: complete-coverage-rv${{ matrix.xlen }}
          path: ${{ env.coverage_upload_path }}
          compression-level: 6
          overwrite: true