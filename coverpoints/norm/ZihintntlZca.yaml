# Mapping of normative rules to coverpoints for a test suite

normative_rule_definitions:
  # If the C or Zca extension is provided, compressed variants of these HINTs are
  # also provided: C.NTL.P1 is encoded as C.ADD x0, x2; C.NTL.PALL is encoded as
  # C.ADD x0, x3; C.NTL.S1 is encoded as C.ADD x0, x4; and C.NTL.ALL is encoded as
  # C.ADD x0, x5.
  - name: C-NTL-P1_op
    coverpoint: ["ZihintntlZca_c_ntl_p1_cg/cp_asm_count"]

  # If the C or Zca extension is provided, compressed variants of these HINTs are
  # also provided: C.NTL.P1 is encoded as C.ADD x0, x2; C.NTL.PALL is encoded as
  # C.ADD x0, x3; C.NTL.S1 is encoded as C.ADD x0, x4; and C.NTL.ALL is encoded as
  # C.ADD x0, x5.
  - name: C-NTL-P1_enc
    coverpoint: ["ZihintntlZca_c_ntl_p1_cg/cp_asm_count"]

  # If the C or Zca extension is provided, compressed variants of these HINTs are
  # also provided: C.NTL.P1 is encoded as C.ADD x0, x2; C.NTL.PALL is encoded as
  # C.ADD x0, x3; C.NTL.S1 is encoded as C.ADD x0, x4; and C.NTL.ALL is encoded as
  # C.ADD x0, x5.
  - name: C-NTL-PALL_op
    coverpoint: ["ZihintntlZca_c_ntl_pall_cg/cp_asm_count"]

  # If the C or Zca extension is provided, compressed variants of these HINTs are
  # also provided: C.NTL.P1 is encoded as C.ADD x0, x2; C.NTL.PALL is encoded as
  # C.ADD x0, x3; C.NTL.S1 is encoded as C.ADD x0, x4; and C.NTL.ALL is encoded as
  # C.ADD x0, x5.
  - name: C-NTL-PALL_enc
    coverpoint: ["ZihintntlZca_c_ntl_pall_cg/cp_asm_count"]

  # If the C or Zca extension is provided, compressed variants of these HINTs are
  # also provided: C.NTL.P1 is encoded as C.ADD x0, x2; C.NTL.PALL is encoded as
  # C.ADD x0, x3; C.NTL.S1 is encoded as C.ADD x0, x4; and C.NTL.ALL is encoded as
  # C.ADD x0, x5.
  - name: C-NTL-S1_op
    coverpoint: ["ZihintntlZca_c_ntl_s1_cg/cp_asm_count"]

  # If the C or Zca extension is provided, compressed variants of these HINTs are
  # also provided: C.NTL.P1 is encoded as C.ADD x0, x2; C.NTL.PALL is encoded as
  # C.ADD x0, x3; C.NTL.S1 is encoded as C.ADD x0, x4; and C.NTL.ALL is encoded as
  # C.ADD x0, x5.
  - name: C-NTL-S1_enc
    coverpoint: ["ZihintntlZca_c_ntl_s1_cg/cp_asm_count"]

  # If the C or Zca extension is provided, compressed variants of these HINTs are
  # also provided: C.NTL.P1 is encoded as C.ADD x0, x2; C.NTL.PALL is encoded as
  # C.ADD x0, x3; C.NTL.S1 is encoded as C.ADD x0, x4; and C.NTL.ALL is encoded as
  # C.ADD x0, x5.
  - name: C-NTL-ALL_op
    coverpoint: ["ZihintntlZca_c_ntl_all_cg/cp_asm_count"]

  # If the C or Zca extension is provided, compressed variants of these HINTs are
  # also provided: C.NTL.P1 is encoded as C.ADD x0, x2; C.NTL.PALL is encoded as
  # C.ADD x0, x3; C.NTL.S1 is encoded as C.ADD x0, x4; and C.NTL.ALL is encoded as
  # C.ADD x0, x5.
  - name: C-NTL-ALL_enc
    coverpoint: ["ZihintntlZca_c_ntl_all_cg/cp_asm_count"]

  # If the C or Zca extension is provided, compressed variants of these HINTs are
  # also provided: C.NTL.P1 is encoded as C.ADD x0, x2; C.NTL.PALL is encoded as
  # C.ADD x0, x3; C.NTL.S1 is encoded as C.ADD x0, x4; and C.NTL.ALL is encoded as
  # C.ADD x0, x5.
  - name: C-NTL-availability
    coverpoint:
      [
        "{ZihintntlZca_c_ntl_p1_cg, ZihintntlZca_c_ntl_pall_cg, ZihintntlZca_c_ntl_s1_cg, ZihintntlZca_c_ntl_all_cg}/cp_asm_count}",
      ]

  # The NTL instructions affect all memory-access instructions except the
  # cache-management instructions in the Zicbom extension.
  - name: NTL_range
    coverpoint: ["not tested - no architectural observable effects"]

  # When an NTL instruction is applied to a prefetch hint in the Zicbop extension,
  # it indicates that a cache line should be prefetched into a cache that is outer
  # from the level specified by the NTL.
  - name: NTL_Zicob_prefetch_outer
    coverpoint: ["not tested - no architectural observable effects"]

  - name: NTL_TRAP_BEHAVIOR
    coverpoint: ["TODO"]

  # Since the NTL instructions are encoded as ADDs, they can be used within LR/SC
  # loops without voiding the forward-progress guarantee. But, since using other
  # loads and stores within an LR/SC loop does void the forward-progress guarantee,
  # the only reason to use an NTL within such a loop is to modify the LR or the SC.
  - name: NTL-LR_SC_exception
    coverpoint: ["TODO"]
