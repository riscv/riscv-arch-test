normative_rule_definitions:
  # Mapping of normative rules to coverpoints for a test suite

  # If access to the cache block is not permitted, a cache-block management
  # instruction raises a store page-fault or store guest-page-fault exception if
  # address translation does not permit any access or raises a store access-fault
  # exception otherwise.
  - name: cbm_unperm_fault
    coverpoint: ["SvPMPZicbo_cg/PA_PMP_RW_unset_cbo_s"]

  # If access to the cache block is not permitted, a cache-block zero instruction
  # raises a store page-fault or store guest-page-fault exception if address
  # translation does not permit write access or raises a store access-fault
  # exception otherwise.
  - name: cbz_unperm_fault
    coverpoint: ["SvPMPZicbo_cg/PA_PMP_RW_unset_cbo_s"]

  # During address translation, the instruction does not check the accessed and
  # dirty bits and neither raises an exception nor sets the bits.
  - name: cbp_unperm_translate
    coverpoint: ["SvPMPZicbo_cg/PA_PMP_RW_unset_cbo_s"]
