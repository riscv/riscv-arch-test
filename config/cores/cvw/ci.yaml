# CI configuration for CORE-V Wally (CVW)
# Requires Verilator and the CVW repository

ci_enabled: true
exclude_extensions: "Sm,InterruptsSm,InterruptsS,InterruptsU,InterruptsSstc,PMPSm,ExceptionsZalrsc,ExceptionsZaamo,ExceptionsSvZalrsc,ExceptionsSvZaamo,Svnapot,Sv,SvPMP,SvPMPZicbo,SvZicbo,Svade,SvaduPMP,Svpbmt,Svinval,PMPS,PMPU"
apt_packages: "autoconf flex bison help2man libfl-dev ccache"
install_script: ".github/scripts/install-cvw.sh"
setup_script: ".github/scripts/setup-cvw.sh"
