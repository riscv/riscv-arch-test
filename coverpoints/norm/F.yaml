    coverpoint:
      [
        "F_fcvt_s_l_cg/{cp_rs1, cp_rs1_edges, cp_fd, cp_frm_2, cp_csr_fflags_n, cp_csr_frm}",
      ]
  - name: fcvt-s-lu_op
    # FCVT.WU.S, FCVT.LU.S, FCVT.S.WU,
