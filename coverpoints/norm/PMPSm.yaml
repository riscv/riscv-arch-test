# Normative rule to coverpoint mappings
# Generated from riscv-isa-manual normative rule definitions

normative_rule_definitions:
  # Failed memory operations generate an instruction, load, or store access-fault
  # exception.
  - name: pmp_access_fault_exception
    coverpoint: ["cp_misaligned_na4_wrap/cp_misaligned_tor_wrap/cp_misaligned_napot/cp_misaligned_na4/cp_misaligned_tor/cp_cfg_A_off_all/cp_cfg_A_napot_all/cp_na4_boundary/cp_tor_boundary/cp_tor_doubleregionfail"]

  # &lt;&lt;pmpcfg&gt;&gt; shows the layout of a PMP configuration register. The R,
  # W, and X bits, when set, indicate that the PMP entry permits read, write, and
  # instruction execution, respectively. When one of these bits is clear, the
  # corresponding access type is denied.
  - name: pmp_cfg_permissions
    coverpoint: ["cp_cfg_X1_all/cp_cfg_RW/cp_cfg_RW00_all/cp_cfg_RW10_all/cp_cfg_RW11_all"]

  # In addition to locking the PMP entry, the L bit indicates whether the R/W/X
  # permissions are additionally enforced on M-mode accesses. When the L bit is set,
  # these permissions are enforced for all privilege modes. When the L bit is clear,
  # any M-mode access matching the PMP entry will succeed; the R/W/X permissions
  # apply only to S and U modes.
  - name: pmp_l_bit_m_mode_enforcement
    coverpoint: ["cp_cfg_X0_all/cp_cfg_X1_all/cp_cfg_L_modify/cp_cfg_L_modify_TOR"]

  # Attempting to fetch an instruction from a PMP region that does not have execute
  # permissions raises an instruction access-fault exception.
  - name: pmp_exec_fault
    coverpoint: ["cp_cfg_X/cp_cfg_X0_all/cp_cfg_RW/cp_cfg_RW00_all/cp_cfg_RW10_all"]

  # If a PMP entry matches all bytes of a memory operation, then the L, R, W, and X
  # bits determine whether the operation succeeds or fails. If the L bit is clear
  # and the privilege mode of the access is M, the operation succeeds. Otherwise, if
  # the L bit is set or the privilege mode of the access is S or U, then the
  # operation succeeds only if the R, W, or X bit corresponding to the access type
  # is set.
  - name: pmp_rwx_check
    coverpoint: ["cp_cfg_RW/cp_cfg_RW00_all/cp_cfg_RW10_all/cp_cfg_RW11_all/cp_cfg_L_access_all"]

  # The L bit indicates that the PMP entry is locked, i.e., writes to the
  # configuration register and associated address registers are ignored.
  - name: pmp_l_bit_function
    coverpoint: ["cp_cfg_L_modify"]

  # If PMP entry i is locked, writes to pmpicfg and pmpaddri are ignored.
  # Additionally, if PMP entry i is locked and pmpicfg.A is set to TOR, writes to
  # pmpaddri-1 are ignored.
  - name: pmp_l_bit_write_protection
    coverpoint: ["cp_cfg_L_modify_TOR"]

  # When G {ge} 1, the NA4 mode is not selectable.
  - name: pmp_na4_select_restriction
    coverpoint: ["cp_cfg_A_all"]

  # The A field in a PMP entry's configuration register encodes the address-matching
  # mode of the associated PMP address register. The encoding of this field is shown
  # in &lt;&lt;pmpcfg-a&gt;&gt;.
  - name: pmp_a_field_encoding
    coverpoint: ["cp_cfg_A_all/cp_cfg_A_off_all/cp_cfg_A_napot_all"]

  # When A=0, this PMP entry is disabled and matches no addresses.
  - name: pmp_a_field_off
    coverpoint: ["cp_misaligned_off/cp_cfg_A_off_all/cp_priority_off"]

  # NAPOT ranges make use of the low-order bits of the associated address register
  # to encode the size of the range, as shown in &lt;&lt;pmpcfg-napot&gt;&gt;.
  - name: pmp_napot_encoding_low_bits
    coverpoint: ["cp_cfg_A_napot_all/cp_cfg_A_napot"]

  # naturally aligned power-of-2 regions (NAPOT), including the special case of
  # naturally aligned four-byte regions (NA4);
  - name: pmp_a_field_napot_na4
    coverpoint: ["cp_cfg_A_na4_all/pmp_a_field_napot_na4"]

  # If TOR is selected, the associated address register forms the top of the address
  # range, and the preceding PMP address register forms the bottom of the address
  # range. If PMP entry i's A field is set to TOR, the entry matches any address y
  # such that pmpaddr~i-1~{le}y&lt;pmpaddr~i~ (irrespective of the value of
  # pmpcfg~i-1~). If PMP entry 0's A field is set to TOR, zero is used for the lower
  # bound, and so it matches any address y&lt;pmpaddr~0~.
  - name: pmp_a_field_tor
    coverpoint: ["cp_cfg_A tor_all/cp_cfg_A_tor/cp_cfg_A_tor0/cp_cfg_A_tor_bot/cp_cfg_A_tor_nonoverlap"]


  # PMP entries are statically prioritized. The lowest-numbered PMP entry that
  # matches any byte of a memory operation determines whether that operation
  # succeeds or fails.
  - name: pmp_entry_priority
    coverpoint: ["cp_misaligned_na4_wrap/cp_misaligned_tor_wrap/cp_misaligned_napot/cp_misaligned_na4/cp_misaligned_tor/cp_priority/cp_priority_off"]

  # When G {ge} 2 and pmpcfg~i~.A[1] is set, i.e. the mode is NAPOT, then bits
  # pmpaddr~i~[G-2:0] read as all ones.
  - name: pmp_napot_addr_read_mask
    coverpoint: ["cp_grain"]

  # When G {ge} 1 and pmpcfg~i~.A[1] is clear, i.e. the mode is OFF or TOR, then
  # bits pmpaddr~i~[G-1:0] read as all zeros. Bits pmpaddr~i~[G-1:0] do not affect
  # the TOR address-matching logic.
  - name: pmp_tor_off_addr_read_mask
    coverpoint: ["cp_grain"]

  # Although the PMP mechanism supports regions as small as four bytes, platforms
  # may specify coarser PMP regions. In general, the PMP grain is 2^G+2^ bytes and
  # must be the same across all PMP regions.
  - name: pmp_region_granularity_g
    coverpoint: ["cp_grain_check"]

  # Not all physical address bits may be implemented, and so the pmpaddr registers
  # are WARL.
  - name: pmp_addr_warl
    coverpoint: ["cp_pmp_addr_walk"]

  # For RV64, eight even-numbered CSRs, pmpcfg0, pmpcfg2, …, pmpcfg14, hold the
  # configurations for the 64 PMP entries, as shown in &lt;&lt;pmpcfg-rv64&gt;&gt;.
  - name: pmp_cfg_rv64_layout
    coverpoint: ["cp_na4_boundary/cp_tor_boundary/cp_tor_doubleregionfail"]

  # For RV64, the odd-numbered configuration registers, pmpcfg1, pmpcfg3, …,
  # pmpcfg15, are illegal.
  - name: pmp_cfg_rv64_illegal
    coverpoint: ["cp_pmpcfg_walk/cp_pmp64"]

  # The R, W, and X fields form a collective WARL field for which the combinations
  # with R=0 and W=1 are reserved.
  - name: pmp_rwx_warl
    coverpoint: ["cp_pmpcfg_walk"]

  # The matching PMP entry must match all bytes of a memory operation, or the
  # operation fails, irrespective of the L, R, W, and X bits.
  - name: pmp_full_match_required
    coverpoint: ["cp_na4_boundary/cp_tor_boundary/cp_tor_doubleregionfail"]

  # Up to 64 PMP entries are supported. Implementations may implement zero, 16, or
  # 64 PMP entries; the lowest-numbered PMP entries must be implemented first.
  - name: pmp_entry_count
    coverpoint: ["cp_pmp64"]

  # Attempting to execute a load, load-reserved, or cache-block management
  # instruction which accesses a physical address within a PMP region without read
  # permissions raises a load access-fault exception.
  - name: pmp_load_fault
    coverpoint: ["cp_pmp64"]

  # Attempting to execute a store, store-conditional, AMO, or cache-block zero
  # instruction which accesses a physical address within a PMP region without write
  # permissions raises a store access-fault exception.
  - name: pmp_store_fault
    coverpoint: ["cp_pmp64"]

  # On some implementations, misaligned loads, stores, and instruction fetches may
  # be decomposed into multiple memory operations, some of which may succeed before
  # an access-fault exception occurs, as described in the RVWMO specification. PMP
  # checking is performed on each memory operation independently.
  - name: pmp_misaligned_access_behavior
    coverpoint: ["cp_misaligned_na4_wrap/cp_misaligned_tor_wrap/cp_misaligned_napot/cp_misaligned_na4/cp_misaligned_tor/cp_misaligned_off"]

  # If no PMP entry matches an M-mode memory operation, the operation succeeds. If
  # no PMP entry matches an S-mode or U-mode memory operation, but at least one PMP
  # entry is implemented, the operation fails.
  - name: pmp_no_entry_match
    coverpoint: ["cp_none"]

  # Although changing pmpcfg~i~.A[1] affects the value read from pmpaddr~i~, it does
  # not affect the underlying value stored in that register—in particular,
  # pmpaddr~i~[G-1] retains its original value when pmpcfg~i~.A is changed from
  # NAPOT to TOR/OFF then back to NAPOT.
  - name: pmp_addr_retention_on_mode_change
    coverpoint: ["cp_grain"]
