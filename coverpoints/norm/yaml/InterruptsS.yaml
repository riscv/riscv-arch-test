normative_rule_definitions:
  # When a trap is delegated to S-mode the scause register is written with the trap
  # cause; the sepc register is written with the virtual address of the instruction
  # that took the trap; the stval register is written with an exception-specific
  # datum; the SPP field of mstatus is written with the active privilege mode at the
  # time of the trap; the SPIE field of mstatus is written with the value of the SIE
  # field at the time of the trap; and the SIE field of mstatus is cleared.
  - name: trap_del_S-mode_op
    coverpoint: ["InterruptsS_cg/cp_priority_mideleg_s"]

  # implementations can provide individual read/write bits within medeleg and
  # mideleg to indicate that certain exceptions and interrupts should be processed
  # directly by a lower privilege level. setting a bit in medeleg or mideleg will
  # delegate the corresponding trap, when occurring in S-mode or U-mode, to the
  # S-mode trap handler.
  - name: mideleg_op
    coverpoint:
      [
        "InterruptsS_cg/cp_trigger_{mti/msi/mei/sti/ssi_mip/ssi_sip/sei_sei_seip}",
      ]

  # mideleg holds trap delegation bits for individual interrupts, with the layout of
  # bits matching those in the mip register
  - name: mideleg_enc
    coverpoint:
      [
        "InterruptsS_cg/cp_trigger_{mti/msi/mei/sti/ssi_mip/ssi_sip/sei_sei_seip}",
      ]

  # Traps never transition from a more-privileged mode to a less-privileged mode.
  # For example, if M-mode has delegated illegal-instruction exceptions to S-mode,
  # and M-mode software later executes an illegal instruction, the trap is taken in
  # M-mode, rather than being delegated to S-mode.
  - name: trap_never_trans_lower
    coverpoint: ["TODO"]

  # traps may be taken horizontally. Using the same example, if M-mode has delegated
  # illegal-instruction exceptions to S-mode, and S-mode software later executes an
  # illegal instruction, the trap is taken in S-mode.
  - name: trap_horiz
    coverpoint: ["TODO"]

  # Delegated interrupts result in the interrupt being masked at the delegator
  # privilege level. For example, if the supervisor timer interrupt (STI) is
  # delegated to S-mode by setting mideleg[5], STIs will not be taken when executing
  # in M-mode. By contrast, if mideleg[5] is clear, STIs can be taken in any mode
  # and regardless of current mode will transfer control to M-mode.
  - name: trap_del_intr_priv_lvl
    coverpoint: ["TODO"]

  # When S-mode is implemented, then executing WFI in U-mode causes an
  # illegal-instruction exception, regardless of the value of the TW bit, unless the
  # instruction completes within an implementation-specific, bounded time limit.
  - name: mstatus_tw_umode_op
    coverpoint: [""]

  # If supervisor mode is implemented, bits mip.SEIP and mie.SEIE are the
  # interrupt-pending and interrupt-enable bits for supervisor-level external
  # interrupts.
  - names: [mip_seip_op, mie_seie_op]
    coverpoint: ["*** some will need to move to S priv"]

  # SEIP is writable in mip
  - name: mip_seip_acc
    coverpoint: [""]

  # When mip is read with a CSR instruction, the value of the SEIP bit returned in
  # the rd destination register is the logical-OR of the software-writable bit and
  # the interrupt signal from the interrupt controller
  - name: mip_seip_rdcsr
    coverpoint: [""]

  # the signal from the interrupt controller is not used to calculate the value
  # written to SEIP. Only the software-writable SEIP bit participates in the
  # read-modify-write sequence of a CSRRS or CSRRC instruction.
  - name: mip_seip_wrcsr
    coverpoint: [""]

  # If the stimecmp register is not implemented, STIP is writable in mip
  - name: mip_stip_no-stimecmp_acc
    coverpoint: [""]

  # If supervisor mode is implemented, its mip.STIP and mie.STIE are the
  # interrupt-pending and interrupt-enable bits for supervisor-level timer
  # interrupts. If the stimecmp register is not implemented, STIP is writable in mip
  # may be written by M-mode software to deliver timer interrupts to S-mode.
  - name: mip_stip_no-stimecmp_op
    coverpoint: [""]

  # If the stimecmp (supervisor-mode timer compare) register is implemented, STIP is
  # read-only in mip
  - name: mip_stip_stimecmp_acc
    coverpoint: [""]

  # If supervisor mode is implemented, its mip.STIP and mie.STIE are the
  # interrupt-pending and interrupt-enable bits for supervisor-level timer
  # interrupts. If the stimecmp (supervisor-mode timer compare) register is
  # implemented, STIP is read-only in mip reflects the supervisor-level timer
  # interrupt signal resulting from stimecmp.
  - name: mip_stip_stimecmp_op
    coverpoint: [""]

  # This timer interrupt signal is cleared by writing stimecmp with a value greater
  # than the current time value.
  - name: mip_stip_stimecmp_clr
    coverpoint: [""]

  # If supervisor mode is implemented, its mip.STIP and mie.STIE are the
  # interrupt-pending and interrupt-enable bits for supervisor-level timer
  # interrupts.
  - name: mip_stie_op
    coverpoint: [""]

  # SSIP is writable in mip
  - name: mip_ssip_acc
    coverpoint: [""]

  # If supervisor mode is implemented, bits mip.SSIP and mie.SSIE are the
  # interrupt-pending and interrupt-enable bits for supervisor-level software
  # interrupts.
  - names: [mip_ssip_op, mie_ssie_op]
    coverpoint: [""]

  # SSIP is writable in mip may also be set to 1 by a platform-specific interrupt
  # controller.
  - name: mip_ssip_intr_ctrl
    coverpoint: [""]
