name: ACT Regression

on:
  push:
  pull_request:

# Only run CI on the latest commit if a PR is updated
concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  lint:
    name: Pre-commit check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Ensure pre-commit checks pass
        run: uvx pre-commit run --all-files --show-diff-on-failure --color=always

  discover-sail-configs:
    name: Discover Sail Configs
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.find.outputs.configs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Find all sail configs
        id: find
        env:
          EXCLUDE: "sail-rv32e sail-rv32-max-clang sail-rv64-max-clang" # TODO: UDB does not support E yet, not all tests work with clang
        run: |
          configs=$(ls -d config/sail/*/ | xargs -n1 basename | grep -vxFf <(tr ' ' '\n' <<< "$EXCLUDE") | sort | jq -R -s -c 'split("\n") | map(select(length > 0)) | map("sail/" + .)')
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

  regress:
    name: Sail Regression (${{ matrix.config }})
    needs: discover-sail-configs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: ${{ fromJson(needs.discover-sail-configs.outputs.configs) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install sail-riscv model
        run: |
          sudo mkdir -p /usr/local
          curl --location https://github.com/riscv/sail-riscv/releases/download/0.10/sail-riscv-$(uname)-$(arch).tar.gz | sudo tar xvz --directory=/usr/local --strip-components=1

      - name: Install RISC-V GCC toolchain
        run: curl --location https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2025.07.16/riscv64-elf-ubuntu-22.04-gcc-nightly-2025.07.16-nightly.tar.xz | sudo tar xvJ --directory=/usr/local --strip-components=1

      - name: Generate tests and coverpoints
        run: make tests --jobs $(nproc)

      - name: Compile and run tests on Sail
        run: |
          # NOTE: RVI20U must not select 'Sm' tests. Therefore, 'Sm' is excluded until the test selector is fixed.
          if [[ "${{ matrix.config }}" == *"RVI20U"* ]]; then
              DOCKER=1 CONFIG_FILES="config/${{ matrix.config }}/test_config.yaml" EXTENSIONS="" EXCLUDE_EXTENSIONS="Sm" make --jobs $(nproc)
          else
              DOCKER=1 CONFIG_FILES="config/${{ matrix.config }}/test_config.yaml" EXTENSIONS="" make --jobs $(nproc)
          fi

  spike:
    name: Spike Regression (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: rv64-max
            config_file: config/spike/spike-rv64-max/test_config.yaml
            config_name: spike-rv64-max
            run_cmd: spike --isa=rv64imafdcbv_zicbom_zicboz_zicbop_zicfilp_zicond_zicsr_zicntr_zicclsm_zifencei_zihintntl_zihintpause_zihpm_zimop_zabha_zacas_zawrs_zfa_zfbfmin_zfh_zcb_zcmop_zbc_zkn_zks_zkr_zvfbfmin_zvfbfwma_zvfh_zvbb_zvbc_zvkg_zvkned_zvknha_zvknhb_zvksed_zvksh_zvkt_sscofpmf_smcntrpmf_sstc_svinval

          - name: rv32-max
            config_file: config/spike/spike-rv32-max/test_config.yaml
            config_name: spike-rv32-max
            run_cmd: spike --isa=rv32imafdcbv_zicbom_zicboz_zicbop_zicfilp_zicond_zicsr_zicntr_zicclsm_zifencei_zihintntl_zihintpause_zihpm_zimop_zabha_zacas_zawrs_zfa_zfbfmin_zfh_zcb_zcmop_zbc_zkn_zks_zkr_zvfbfmin_zvfbfwma_zvfh_zvbb_zvbc_zvkg_zvkned_zvknha_zvknhb_zvksed_zvksh_zvkt_sscofpmf_smcntrpmf_sstc_svinval

          - name: RVI20U64
            config_file: config/spike/spike-RVI20U64/test_config.yaml
            config_name: spike-RVI20U64
            run_cmd: spike --isa=rv64imafdc_zicclsm_zicsr_zifencei_zicntr_zca_zcd_zaamo_zalrsc

          - name: RVI20U32
            config_file: config/spike/spike-RVI20U32/test_config.yaml
            config_name: spike-RVI20U32
            run_cmd: spike --isa=rv32imafdc_zicclsm_zicsr_zifencei_zicntr_zca_zcd_zaamo_zalrsc

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y device-tree-compiler \
                                  libboost-regex-dev \
                                  libboost-system-dev

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install sail-riscv model
        run: |
          sudo mkdir -p /usr/local
          curl --location https://github.com/riscv/sail-riscv/releases/download/0.10/sail-riscv-$(uname)-$(arch).tar.gz \
          | sudo tar xvz --directory=/usr/local --strip-components=1

      - name: Get Latest Spike Commit
        run: |
          SPIKE_HASH=$(git ls-remote https://github.com/riscv/riscv-isa-sim.git HEAD | awk '{ print $1}')
          echo "SPIKE_HASH=$SPIKE_HASH" >> "$GITHUB_ENV"

      - name: Restore cached Spike
        id: cache-spike-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/spike
          key: spike-${{ env.SPIKE_HASH }}

      - name: Install Spike
        if: steps.cache-spike-restore.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/riscv/riscv-isa-sim.git
          cd riscv-isa-sim
          mkdir build
          cd build
          ../configure --prefix=$GITHUB_WORKSPACE/spike
          make -j$(nproc)
          make install

      - name: Save cached Spike
        if: steps.cache-spike-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/spike
          key: spike-${{ env.SPIKE_HASH }}

      - name: Add Spike to PATH
        run: echo "$GITHUB_WORKSPACE/spike/bin" >> $GITHUB_PATH

      - name: Install RISC-V GCC toolchain
        run: |
          curl --location https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2025.07.16/riscv64-elf-ubuntu-22.04-gcc-nightly-2025.07.16-nightly.tar.xz \
          | sudo tar xvJ --directory=/usr/local --strip-components=1

      - name: Build ELFs
        run: |
          DOCKER=1 \
          FAST=True \
          EXTENSIONS="" \
          EXCLUDE_EXTENSIONS=Sm,ExceptionsZc \
          CONFIG_FILES=${{ matrix.config_file }} \
          make elfs --jobs $(nproc)

      - name: Run Spike Tests
        run: |
          ./run_tests.py "${{ matrix.run_cmd }}" \
          work/${{ matrix.config_name }}/elfs

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-logs
          path: work/${{ matrix.config_name }}/logs

  vector-testgen:
    name: Vector Testgen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Generate vector tests
        run: make vector-tests --jobs $(nproc)

  ctp-build:
    name: Build CTP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - run: git submodule update --init ctp/docs-resources crd/docs-resources external/riscv-unified-db

      - name: Pull Container
        run: docker pull riscvintl/riscv-docs-base-container-image:latest

      - name: Build
        run: cd ctp && make -j2

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ctp.pdf
          path: ctp/build/ctp.pdf

      - name: Upload HTML
        uses: actions/upload-artifact@v4
        with:
          name: ctp.html
          path: ctp/build/ctp.html

  # This is here so that the "Status checks that are required" Github
  # option doesn't need to list all of the matrix jobs (it doesn't seem
  # to work if you just specify the job ID of the matrix itself).
  ci_pass:
    runs-on: ubuntu-latest
    needs: [lint, regress, spike, vector-testgen, ctp-build]
    steps:
      - name: Dummy
        run: echo 'Jobs need at least one step.'
