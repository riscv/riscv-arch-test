  MUTABLE_MISA_B: true
  # V params
  VLEN: 512
  ELEN: 64
  FOLLOW_VTYPE_RESET_RECOMMENDATION: true
  RVV_VL_WHEN_AVL_LT_DOUBLE_VLMAX: VLMAX
  MUTABLE_MISA_V: true
  HW_MSTATUS_VS_DIRTY_UPDATE: precise
  # CBO params
  CACHE_BLOCK_SIZE: 64
  FORCE_UPGRADE_CBO_INVAL_TO_FLUSH: false
