# yaml-language-server: $schema=../../../../external/riscv-unified-db/spec/schemas/config_schema.json
---
$schema: config_schema.json#
kind: architecture configuration
type: fully configured
name: cv32e20
description: CV32E20 (CVE2 small) - RV32IMC configuration DUT

# high-level implemented extensions (VERIFIED)
implemented_extensions:
  - { name: I, version: "2.1" }
  - { name: M, version: "2.0" }
  - { name: C, version: "2.0" }
  - { name: Zicsr, version: "2.0" }
  - { name: Zifencei, version: "2.0" }


# Architecture / behavior parameters 
params:
  # XLEN parameters (VERIFIED)
  MXLEN: 32
  UXLEN: 32
  PHYS_ADDR_WIDTH: 32

  # MISA (VERIFIED)
  MUTABLE_MISA_M: false
  MUTABLE_MISA_C: false
  MUTABLE_MISA_U: false
  MISA_CSR_IMPLEMENTED: true

  # endianness (VERIFIED)
  M_MODE_ENDIANNESS: little
  U_MODE_ENDIANNESS: little

  # trap/exception behavior (VERIFIED)
  TRAP_ON_ECALL_FROM_U: true
  TRAP_ON_ECALL_FROM_M: true
  TRAP_ON_EBREAK: true
  TRAP_ON_UNIMPLEMENTED_INSTRUCTION: true
  TRAP_ON_RESERVED_INSTRUCTION: true
  TRAP_ON_UNIMPLEMENTED_CSR: false
  TRAP_ON_ILLEGAL_WLRL: false

  # MTVAL reporting (VERIFIED)
  REPORT_VA_IN_MTVAL_ON_BREAKPOINT: true
  REPORT_VA_IN_MTVAL_ON_LOAD_MISALIGNED: true
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_MISALIGNED: true
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_MISALIGNED: true
  REPORT_VA_IN_MTVAL_ON_LOAD_ACCESS_FAULT: true
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_ACCESS_FAULT: true
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_ACCESS_FAULT: true
  REPORT_ENCODING_IN_MTVAL_ON_ILLEGAL_INSTRUCTION: true
  MTVAL_WIDTH: 32

  # Misaligned load/store support
  MISALIGNED_LDST: true                           # (VERIFIED)
  MISALIGNED_LDST_EXCEPTION_PRIORITY: low         # LSU documentation says: “If an error response is received for the first transaction, the second transaction will still be issued and ignored.” means that Misalignment does not cause an exception
  MISALIGNED_MAX_ATOMICITY_GRANULE_SIZE: 4096     # unable to verify from documentation (but 4kb sounds reasonable)
  MISALIGNED_SPLIT_STRATEGY: custom               # from LSU docs

  # CSR / implementation IDs (VERIFIED)
  ARCH_ID: 0x23
  IMP_ID: 0x0
  VENDOR_ID_BANK: 0xC
  VENDOR_ID_OFFSET: 0x2

  # MTVEC (VERIFIED)
  MTVEC_MODES: [1]
  MTVEC_BASE_ALIGNMENT_DIRECT: 256       
  MTVEC_BASE_ALIGNMENT_VECTORED: 256

  # HPM (VERIFIED)
  MHPMCounterNum: 10
  MHPMCounterWidth: 32

  # HPM arrays (VERIFIED)
  HPM_COUNTER_EN:
    [
      false, false, false,  # indexes 0..2 (MCYCLE, MINSTRET, MHPM2)
      true, true, true, true, true, true, true, true, true, true,
      false, false, false, false, false, false, false, false, false, false,
      false, false, false, false, false, false, false, false, false
    ]

  # COUNTINHIBIT_EN (VERIFIED)
  COUNTINHIBIT_EN:
    [
      true, false, false,
      false, false, false, false, false, false, false, false, false,
      false, false, false, false, false, false, false, false, false, false,
      false, false, false, false, false, false, false, false, false, false
    ]

  # MCOUNTENABLE_EN
  MCOUNTENABLE_EN:
    [
      false, false, false,
      false, false, false, false, false, false, false, false, false,
      false, false, false, false, false, false, false, false, false, false,
      false, false, false, false, false, false, false, false, false, false
    ]

  # CONFIG PTR (VERIFIED)
  CONFIG_PTR_ADDRESS: 0x15