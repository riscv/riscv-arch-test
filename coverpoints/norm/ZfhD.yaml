# Mapping of normative rules to coverpoints for a test suite

normative_rule_definitions:
  - name: fcvt-d-h_op
    # If
    # the D extension is present, FCVT.D.H or FCVT.H.D converts a
    # half-precision floating-point number to a double-precision
    # floating-point number, or vice-versa, respectively
    # FCVT.S.D rounds according to the RM field; FCVT.D.S will
    # never round
    coverpoint:
      [
        "ZfhD_fcvt_d_h_cg/{cp_fs1, cp_fd, cp_fs1_edges_H, cp_csr_fflags_v, cp_fs1_badNB_D_H}",
      ]
  - name: fcvt-h-d_op
    # If
    # the D extension is present, FCVT.D.H or FCVT.H.D converts a
    # half-precision floating-point number to a double-precision
    # floating-point number, or vice-versa, respectively
    # FCVT.S.D rounds according to the RM field; FCVT.D.S will
    # never round
    coverpoint:
      [
        "ZfhD_fcvt_h_d_cg/{cp_fs1, cp_fd, cp_fs1_edges_frm_D, cp_frm_2, cp_csr_fflags_voun, cp_csr_frm, cp_NaNBox_D_H}",
      ]
  - name: fadd-h_op
    # FADD.S and FMUL.S
    # perform single-precision floating-point addition and multiplication
    # respectively, between rs1 and rs2
    # The half-precision floating-point computational instructions are defined analogously to their single-precision counterparts, but operate on half-precision operands and produce half-precision results.
    # Apart from transfer operations described in the previous paragraph, all other floating-point operations on narrower n-bit operations, n&lt;FLEN, check if the input operands are correctly NaN-boxed, i.e., all upper FLEN-n bits are 1. If so, the n least-significant bits of the input are used as the input value, otherwise the input value is treated as an n-bit canonical NaN.
    # Operations on subnormal numbers are handled in accordance with the IEEE 754-2008 standard.
    # In the parlance of the IEEE standard, tininess is detected after rounding.
    # Rounding Mode|Mnemonic|Meaning
    # ===
    # 000|RNE|Round to Nearest, ties to Even¶001|RTZ|Round towards Zero¶010|RDN|Round Down (towards −∞)¶011|RUP|Round Up (towards +∞)¶100|RMM|Round to Nearest, ties to Max Magnitude¶101||Reserved for future use.¶110||Reserved for future use.¶111|DYN|In instruction&#8217;s rm field, selects dynamic rounding mode; In Rounding Mode register, reserved.
    # ===
    # Floating-point operations use either a static rounding mode encoded in
    # the instruction, or a dynamic rounding mode held in frm. Rounding
    # modes are encoded as shown in &lt;&lt;norm:dyn_round_enc&gt;&gt;. A value of 111 in the
    # instruction's rm field selects the dynamic rounding mode held in
    # frm
    coverpoint:
      ["ZfhD_fadd_h_cg/{cp_NaNBox_D_H, cp_fs1_badNB_D_H, cp_fs2_badNB_D_H}"]
  - name: fclass-h_op
    # fThe FCLASS.S instruction examines the value in floating-point register rs1 and writes to integer register rd a 10-bit mask that indicates the class of the floating-point number. The format of the mask is described in . The corresponding bit in rd will be set if the property is true and clear otherwise. All other bits in rd are cleared. Note that exactly one bit in rd will be set. FCLASS.S does not set the floating-point exception flags.
    # The half-precision floating-point classify instruction, FCLASS.H, is defined analogously to its single-precision counterpart, but operates on half-precision operands.
    coverpoint: ["ZfhD_fclass_h_cg/{cp_fs1_badNB_D_H}"]
  - name: fcvt-h-l_op
    # FCVT.H.W or FCVT.H.L converts a 32-bit or 64-bit signed
    # integer, respectively, into a half-precision floating-point number
    # All floating-point to integer and integer to floating-point conversion instructions round according to the rm field. A floating-point register can be initialized to floating-point positive zero using FCVT.S.W rd, x0, which will never set any exception flags.
    # FCVT.L[U].H and FCVT.H.L[U] are RV64-only
    # instructions.
    # All floating-point conversion instructions set the Inexact exception flag if the rounded result differs from the operand value and the Invalid exception flag is not set.
    # If the rounded result is not representable in the
    # destination format, it is clipped to the nearest value and the invalid
    # flag is set
    # Operations on subnormal numbers are handled in accordance with the IEEE 754-2008 standard.
    # In the parlance of the IEEE standard, tininess is detected after rounding.
    # Rounding Mode|Mnemonic|Meaning
    # ===
    # 000|RNE|Round to Nearest, ties to Even¶001|RTZ|Round towards Zero¶010|RDN|Round Down (towards −∞)¶011|RUP|Round Up (towards +∞)¶100|RMM|Round to Nearest, ties to Max Magnitude¶101||Reserved for future use.¶110||Reserved for future use.¶111|DYN|In instruction&#8217;s rm field, selects dynamic rounding mode; In Rounding Mode register, reserved.
    # ===
    # Floating-point operations use either a static rounding mode encoded in
    # the instruction, or a dynamic rounding mode held in frm. Rounding
    # modes are encoded as shown in &lt;&lt;norm:dyn_round_enc&gt;&gt;. A value of 111 in the
    # instruction's rm field selects the dynamic rounding mode held in
    # frm
    coverpoint: ["ZfhD_fcvt_h_l_cg/{cp_NaNBox_D_H}"]
  - name: fcvt-h-lu_op
    # FCVT.WU.H, FCVT.LU.H, FCVT.H.WU, and FCVT.H.LU variants convert to or
    # from unsigned integer values
    # All floating-point to integer and integer to floating-point conversion instructions round according to the rm field. A floating-point register can be initialized to floating-point positive zero using FCVT.S.W rd, x0, which will never set any exception flags.
    # FCVT.L[U].H and FCVT.H.L[U] are RV64-only
    # instructions.
    # All floating-point conversion instructions set the Inexact exception flag if the rounded result differs from the operand value and the Invalid exception flag is not set.
    # If the rounded result is not representable in the
    # destination format, it is clipped to the nearest value and the invalid
    # flag is set
    # Operations on subnormal numbers are handled in accordance with the IEEE 754-2008 standard.
    # In the parlance of the IEEE standard, tininess is detected after rounding.
    # Rounding Mode|Mnemonic|Meaning
    # ===
    # 000|RNE|Round to Nearest, ties to Even¶001|RTZ|Round towards Zero¶010|RDN|Round Down (towards −∞)¶011|RUP|Round Up (towards +∞)¶100|RMM|Round to Nearest, ties to Max Magnitude¶101||Reserved for future use.¶110||Reserved for future use.¶111|DYN|In instruction&#8217;s rm field, selects dynamic rounding mode; In Rounding Mode register, reserved.
    # ===
    # Floating-point operations use either a static rounding mode encoded in
    # the instruction, or a dynamic rounding mode held in frm. Rounding
    # modes are encoded as shown in &lt;&lt;norm:dyn_round_enc&gt;&gt;. A value of 111 in the
    # instruction's rm field selects the dynamic rounding mode held in
    # frm
    coverpoint: ["ZfhD_fcvt_h_lu_cg/{cp_NaNBox_D_H}"]
  - name: fcvt-h-s_op
    # FCVT.S.H or
    # FCVT.H.S converts a half-precision floating-point number to a
    # single-precision floating-point number, or vice-versa, respectively
    # FCVT.S.D rounds according to the RM field; FCVT.D.S will
