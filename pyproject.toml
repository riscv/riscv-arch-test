# pyproject.toml
# Top-level python project configuration file for riscv-arch-test
# Jordan Carlin jcarlin@hmc.edu October 2025
# SPDX-License-Identifier: Apache-2.0

[tool.uv.workspace]
members = ["framework", "generators/testgen", "generators/ctp"]

[dependency-groups]
dev = ["pyright>=1.1.407", "ruff==0.14.10"]

###### RUFF CONFIG #####
[tool.ruff]
line-length = 120
extend-exclude = [
  "external",
  "_archive",
  "ctp",
  "generators/coverage",
  "generators/testgen/scripts", # Old scripts that still need to be updated
]

[tool.ruff.lint]
select = [
  "F",   # various basic rules (pyflakes)
  "E",   # errors (pycodestyle)
  "W",   # warnings (pycodestyle)
  "I",   # Import related rules (isort)
  "UP",  # Upgraded version available in newer Python
  "B",   # bugbear rules
  "A",   # shadow builtins
  "EXE", # Executable file shebangs
  "ANN", # type annotation rules
  "RUF", # Ruff specific rules
  "PTH", # Pathlib usage
  "SIM", # Simplifications
]

ignore = [
  # handled by formatter
  "W191",
  "E111",
  "E114",
  "E117",
  "D206",
  "D300",
  "Q000",
  "Q001",
  "Q002",
  "Q003",
  "COM812",
  "COM819",
  "E501",
]

[tool.ty.src]
exclude = ["external", "_archive"]

##### PYRIGHT CONFIG #####
[tool.pyright]
exclude = [
  "**/__pycache__",
  "**/node_modules",
  "**/.*",
  ".venv",
  "external",
  "_archive",
  "ctp",
  "generators/ctp",
  "generators/coverage",
  "generators/testgen/scripts", # Old scripts that still need to be updated
]
typeCheckingMode = "standard"
