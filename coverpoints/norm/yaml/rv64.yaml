# Mapping of normative rules to coverpoints for a test suite

normative_rule_definitions:
  - name: addiw_op
    coverpoint: ["I_addw_cg/{cp_rs1, cp_rd, cr_rs1_imm_edges}"]
  - name: addiw_overflow
    coverpoint: ["I_addw_cg/cr_rs1_imm_edges"]
  - names: ["addw_op, subw_op"]
    coverpoint:
      ["{I_addw_cg, I_subw_cg}/{cp_rs1, cp_rs2, cp_rd, cr_rs1_rs2_edges}"]
  - name: addw_overflow
    coverpoint: ["I_addw_cg/cr_rs1_rs2_edges"]
  - name: auipc_op_rv64i
    coverpoint: ["I_auipc_cg/{cp_rd, cp_imm_edges_20bit}"]
  - names: ["lb_rv64i_op"]
    coverpoint: ["I_lb_cg/cp_memval_byte"]
  - name: lbu_rv64i_op
    coverpoint: ["I_lbu_cg/cp_memval_byte"]
  - name: ld_op_rv64i
    coverpoint: ["I_ld_cg/cp_memval_double"]
  - name: lh_op_rv64i
    coverpoint: ["I_lh_cg/cp_memval_half"]
  - name: lhu_rv64i_op
    coverpoint: ["I_lhu_cg/cp_memval_half"]
  - name: lui_op_rv64i
    coverpoint: ["I_lui_cg/cp_imm_edges_20bit"]
  - name: lw_op_rv64i
    coverpoint: ["I_lw_cg/cp_memval_word"]
