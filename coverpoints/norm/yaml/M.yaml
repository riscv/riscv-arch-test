# Mapping of normative rules to coverpoints for a test suite

normative_rule_definitions:
  - name: mul_op
    coverpoint: ["M_mul_cg/{cp_rs1, cp_rs2, cp_rd, cp_rs1_rs2_edges}"]
  - names: ["mulh_op, mulhu_op, mulhsu_op"]
    coverpoint:
      [
        "{M_mulh_cg, M_mulhu_cg, M_mulhsu_cg}/{cp_rs1, cp_rs2, cp_rd, cp_rs1_rs2_edges}}",
      ]
  - names: ["div_op, divu_op"]
    coverpoint:
      ["{M_div_cg, M_divu_op}/{cp_rs1, cp_rs2, cp_rd, cp_rs1_rs2_edges}"]
  - names: ["divw_op, divuw_op"]
    coverpoint:
      ["{M_divw_cg, M_divuw_op}/{cp_rs1, cp_rs2, cp_rd, cp_rs1_rs2_edges}"]
  - names: ["rem_op, remu_op"]
    coverpoint:
      ["{M_rem_cg, M_remu_op}/{cp_rs1, cp_rs2, cp_rd, cp_rs1_rs2_edges}"]
  - names: ["remw_op, remuw_op"]
    coverpoint:
      ["{M_remw_cg, M_remuw_op}/{cp_rs1, cp_rs2, cp_rd, cp_rs1_rs2_edges}"]
  - name: div_by_zero
    coverpoint: ["{M_div_cg, M_divu_op}/{cp_rs1_rs2_edges}"]
  - name: rem_by_zero
    coverpoint: ["{M_rem_cg, M_remu_op}/{cp_rs1_rs2_edges}"]
  - name: signed_div_overflow
    coverpoint: ["{M_rem_cg}/{cp_rs1_rs2_edges}"]
  - name: rem_result_sign
    coverpoint: ["{M_rem_cg}/{cp_rs1_rs2_edges}"]
  - names: ["remw_result_sign, remuw_result_sign"]
    coverpoint: ["{M_remw_cg/M_remuw_cg}/{cp_rs1_rs2_edges}"]
  - name: mulw_op
    coverpoint: ["M_mulw_cg/{cp_rs1, cp_rs2, cp_rd, cp_rs1_rs2_edges}"]
