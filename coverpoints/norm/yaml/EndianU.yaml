normative_rule_definitions:
  # If U-mode is not supported, UBE is read-only 0. Otherwise, UBE controls whether
  # explicit load and store memory accesses made from U-mode are little-endian
  # (UBE=0) or big-endian (UBE=1).
  - name: mstatus_ube_op
    coverpoint: [""]

  # If U-mode is supported, an implementation may make UBE be a read-only copy of
  # either MBE or SBE.
  - name: mstatus_ube_rocopy
    coverpoint: [""]
