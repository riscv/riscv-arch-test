  # # Floating-point square root vfsqrt.v vd, vs2, vm # Vector-vector square root
  - name: vfsqrt_op
    coverpoint: [""]

  # This is a unary vector-vector instruction that returns an estimate of 1/sqrt(x)
  # accurate to 7 bits. For the non-exceptional cases, the low bit of the exponent
  # and the six high bits of significand (after the leading one) are concatenated
  # and used to address the following table. The output of the table becomes the
  # seven high bits of the result significand (after the leading one); the remainder
  # of the result significand is zero. Subnormal inputs are normalized and the
  # exponent adjusted appropriately before the lookup. The output exponent is chosen
  # to make the result approximate the reciprocal of the square root of the
  # argument. More precisely, the result is computed as follows. Let the normalized
  # input exponent be equal to the input exponent if the input is normal, or 0 minus
  # the number of leading zeros in the significand otherwise. If the input is
  # subnormal, the normalized input significand is given by shifting the input
  # significand left by 1 minus the normalized input exponent, discarding the
  # leading 1 bit. The output exponent equals floor((3*B - 1 - the normalized input
  # exponent) / 2), where B is the exponent bias. The output sign equals the input
  # sign.
  - name: vfrsqrt7_op
    coverpoint: [""]

  # This is a unary vector-vector instruction that returns an estimate of 1/x
  # accurate to 7 bits. For the non-exceptional cases, the seven high bits of
  # significand (after the leading one) are used to address the following table. The
  # output of the table becomes the seven high bits of the result significand (after
  # the leading one); the remainder of the result significand is zero. Subnormal
  # inputs are normalized and the exponent adjusted appropriately before the lookup.
  # The output exponent is chosen to make the result approximate the reciprocal of
  # the argument, and subnormal outputs are denormalized accordingly. More
  # precisely, the result is computed as follows. Let the normalized input exponent
  # be equal to the input exponent if the input is normal, or 0 minus the number of
  # leading zeros in the significand otherwise. The normalized output exponent
  # equals (2*B - 1 - the normalized input exponent). If the normalized output
  # exponent is outside the range [-1, 2*B], the result corresponds to one of the
  # exceptional cases in the table above. If the input is subnormal, the normalized
  # input significand is given by shifting the input significand left by 1 minus the
  # normalized input exponent, discarding the leading 1 bit. Otherwise, the
  # normalized input significand equals the input significand. The following table
  # gives the seven MSBs of the normalized output significand as a function of the
  # seven MSBs of the normalized input significand; the other bits of the normalized
  # output significand are zero. If the normalized output exponent is 0 or -1, the
  # result is subnormal: the output exponent is 0, and the output significand is
  # given by concatenating a 1 bit to the left of the normalized output significand,
  # then shifting that quantity right by 1 minus the normalized output exponent.
  # Otherwise, the output exponent equals the normalized output exponent, and the
  # output significand equals the normalized output significand. The output sign
  # equals the input sign.
  - name: vfrec7_op
