# pyproject.toml
# Top-level python project configuration file for riscv-arch-test
# Jordan Carlin jcarlin@hmc.edu October 2025
# SPDX-License-Identifier: Apache-2.0

[tool.uv.workspace]
members = ["framework", "generators/testgen"]

[dependency-groups]
dev = ["pyright==1.1.408", "ruff==0.14.10"]

###### RUFF CONFIG #####
[tool.ruff]
line-length = 120
extend-exclude = [
  "external",
  "generators/testgen/scripts", # Old scripts that still need to be updated
]

[tool.ruff.lint]
extend-select = [
  "F",   # various basic rules (pyflakes)
  "E",   # errors (pycodestyle)
  "W",   # warnings (pycodestyle)
  "I",   # Import related rules (isort)
  "UP",  # Upgraded version available in newer Python
  "B",   # bugbear rules
  "A",   # shadow builtins
  "EXE", # Executable file shebangs
  "ANN", # type annotation rules
  "RUF", # Ruff specific rules
  "PTH", # Pathlib usage
  "SIM", # Simplifications
]

ignore = [
  # handled by formatter
  "W191",
  "E111",
  "E114",
  "E117",
  "D203",
  "D206",
  "D213",
  "D300",
  "Q000",
  "Q001",
  "Q002",
  "Q003",
  "COM812",
  "COM819",
  "E501",
  "T201",   # allow print statements
  "TD002",  # allow TODO comments without authors
  "TD003",  # allow TODO comments without issue links
  "FIX",    # allow TODO comments
]

[tool.ty.src]
exclude = [
  "external",
  "generators/testgen/scripts", # Old scripts that still need to be updated
]

##### PYRIGHT CONFIG #####
[tool.pyright]
exclude = [
  "**/__pycache__",
  "**/node_modules",
  "**/.*",
  ".venv",
  "external",
  "generators/testgen/scripts", # Old scripts that still need to be updated
]
typeCheckingMode = "standard"
