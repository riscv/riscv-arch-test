  - name: VSXL_RO
    impl-def: VSXL_RO
    type: boolean
  - name: VTW_VIRTINSTR
    impl-def: VTW_VIRTINSTR
    type: boolean
  - name: GEILEN
    impl-def: GEILEN
    range: [0, 64]
  - name: HTVAL_GUEST_PAGE_FAULT_TRAPVAL
    impl-def: HTVAL_TRAPVAL
    type: [WrZero, WrGuestPA, Other]
    description: |
      When a guest-page-fault trap is taken into HS-mode, htval is written with either zero
      or the shifted guest physical address that faulted (shifted means right by 2 bits here).

      [%autowidth]
      !===
      ! Value ! Definition

      ! WrZero ! Always writes zero to htval on guest-page-fault traps
      ! WrGuestPA ! Always writes the shifted guest physical address on guest-page-fault traps
      ! Other ! Sometimes writes zero and sometimes writes the shifted guest physical address on guest-page-fault traps
      !===
  - name: VMIDLEN
    impl-def: HGATP_VMID
    range: [0, 14]
    description: The number of implemented VMID bits
  - name: VSSTATUS_UBE
    impl-def: VSSTATUS_UBE
    type: boolean
    description: |
      Is the `vstatus.UBE` a read-only copy of `hstatus.VSBE`?

      [%autowidth]
      !===
      ! Value ! Definition

      ! False ! Not a read-only copy of `hstatus.VSBE`
      ! True ! Is a read-only copy of `hstatus.VSBE`
      !===
  - name: MTVAL2_TRAPVAL
    impl-def: MTVAL2_TRAPVAL
    type: [WrZero, WrGuestPA, Other]
    description: Same as HTVAL_GUEST_PAGE_FAULT_TRAPVAL except for `mtval2` and trap into M-mode

