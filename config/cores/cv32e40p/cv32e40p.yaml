# UDB Architecture Configuration for the CV32E40P, a configuration of the CORE-V project.
---
$schema: config_schema.json#
kind: architecture configuration
type: fully configured
name: cv32e40p
description: CV32E40P (CORE-V small) - RV32IMC configuration DUT
implemented_extensions: # VERIFIED — manual documents these extensions as implemented
  - { name: I, version: "= 2.1" }
  - { name: M, version: "= 2.0" }
  - { name: Zca, version: "= 1.0.0" }
  - { name: Zicsr, version: "= 2.0" }
  - { name: Zifencei, version: "= 2.0" }
  - { name: Zicntr, version: "= 2.0" }
  - { name: Sm, version: "= 1.11.0" }
  - { name: Smhpm, version: "= 1.11.0" }

params:
  # XLEN parameters (VERIFIED)
  MXLEN: 32                              # VERIFIED — intro.rst line 72; RV32I base ISA
  #UXLEN: [32] # Why is this a 'Flow Sequence' when MXLEN is an integer?
  PHYS_ADDR_WIDTH: 32                    # VERIFIED — control_status_registers.rst; 32-bit addressing

  # MISA (VERIFIED)
  MUTABLE_MISA_M: false                  # VERIFIED — M bit is RO per control_status_registers.rst table
  MUTABLE_MISA_C: false                  # VERIFIED — C bit is RO per control_status_registers.rst table
  MISA_CSR_IMPLEMENTED: true             # VERIFIED — MISA CSR (0x301) documented

  # endianness (VERIFIED)
  M_MODE_ENDIANNESS: little              # VERIFIED — intro.rst line 77 (little-endian architecture)
  #U_MODE_ENDIANNESS: little

  # trap/exception behavior (Section 5 — Trap & Exception Behavior)
  #TRAP_ON_ECALL_FROM_U: true
  TRAP_ON_ECALL_FROM_M: true             # VERIFIED — exceptions_interrupts.rst:122 "cannot be disabled"
  TRAP_ON_EBREAK: true                   # VERIFIED — exceptions_interrupts.rst Exception part has table with excepropm code breakpoint
  TRAP_ON_UNIMPLEMENTED_INSTRUCTION: true # VERIFIED — exceptions_interrupts.rst:122–125 "cannot be disabled"
  TRAP_ON_RESERVED_INSTRUCTION: true     # VERIFIED — exceptions_interrupts.rst does mention this implicitly with FPU disabled, rtl shows that it also traps on PULP extensions, undefined opcodes, and any instruction not explicitly decoded
  TRAP_ON_UNIMPLEMENTED_CSR: true       # VERIFIED - rtl code from decoder.sv shows case statement for illegal instructions (if we configure it without FPU for example), there is default case (this is our situation!)
  TRAP_ON_ILLEGAL_WLRL: false            # VERIFIED - checked decoder.sv it only traps illegal csrs, cs_registers.sv does only masking 

   # MTVAL reporting (Section 6 — mtval CSR)
  REPORT_VA_IN_MTVAL_ON_BREAKPOINT: false # VERIFIED — registers.sv: mtval is hardwired to 0
  REPORT_VA_IN_MTVAL_ON_LOAD_MISALIGNED: false # VERIFIED — registers.sv: mtval is hardwired to 0
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_MISALIGNED: false # VERIFIED — registers.sv: mtval is hardwired to 0
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_MISALIGNED: false # VERIFIED — registers.sv: mtval is hardwired to 0
  REPORT_VA_IN_MTVAL_ON_LOAD_ACCESS_FAULT: false # VERIFIED — registers.sv: mtval is hardwired to 0
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_ACCESS_FAULT: false # VERIFIED — registers.sv: mtval is hardwired to 0
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_ACCESS_FAULT: false # VERIFIED — registers.sv: mtval is hardwired to 0
  REPORT_ENCODING_IN_MTVAL_ON_ILLEGAL_INSTRUCTION: false # VERIFIED — registers.sv: mtval is hardwired to 0
  MTVAL_WIDTH: 32                        # 32-bit field, RO hardwired to 0 — all REPORT_* flags are false


#   # Misaligned load/store support (Section 7 — Misaligned Load/Store)
  MISALIGNED_LDST: true                  # VERIFIED — load_store_unit.rst performed as two bustransactions (this is little confisuing udb asks Does it perform non-atomic misaligned loads/stores.)
  MISALIGNED_LDST_EXCEPTION_PRIORITY: low # VERIFIED — load_store_unit.rst: never raises exception; DO we need this parameter if above is true? It seems like this is only relevant if above is false, but we can include it for completeness?
  MISALIGNED_MAX_ATOMICITY_GRANULE_SIZE: 0 # VERIFIED — load_store_unit.rst performed as two bustransactions no ato
  MISALIGNED_SPLIT_STRATEGY: custom      # FROM MANUAL — load_store_unit.rst; lowest address is performed first from manual, UDB only has two options costume and sequential bytes

#   # CSR / implementation IDs (Section 3 — Implementation IDs)
  ARCH_ID_VALUE: 0x00000004             # VERIFIED — control_status_registers.rst: marchid=0x4
  IMP_ID_VALUE: 0x0                     # VERIFIED — core_versions.rst: mimpid=0 when COREV_PULP=0, FPU=0 (we might change our config to FPU=0 per Maikes instructions - test with optional ISA features)
  VENDOR_ID_BANK: 0xC                   # FROM MANUAL — mvendorid 0x602 decoded: bits[31:7]=0xC (JEDEC bank 13)
  VENDOR_ID_OFFSET: 0x2                 # FROM MANUAL — mvendorid 0x602 decoded: bits[6:0]=0x2 (manufacturer byte)

#   # MTVEC (Section 4 — mtvec WARL)
#   MTVEC_MODES: [0, 1]                    # VERIFIED — control_status_registers.rst:589 "both direct and vectored supported"
#   MTVEC_ACCESS: rw                       # VERIFIED — control_status_registers.rst:577 MODE[0] is RW
#   MTVEC_ILLEGAL_WRITE_BEHAVIOR: retain   # ASSUMED — standard trap vector behavior
#   MTVEC_BASE_ALIGNMENT_VECTORED: 256     # VERIFIED — control_status_registers.rst:567 "256-byte aligned"
#   MTVEC_BASE_ALIGNMENT_DIRECT: 256       # VERIFIED — control_status_registers.rst:567 same alignment for both modes

#   # Sm params (Section 9 — Sm Parameters)
#   PRECISE_SYNCHRONOUS_EXCEPTIONS: true   # ASSUMED — standard RISC-V Priv Spec § 3.3 (manual doesn't explicitly state)
#   MARCHID_IMPLEMENTED: true              # VERIFIED — control_status_registers.rst: marchid (0xF12) is implemented
#   MIMPID_IMPLEMENTED: true               # VERIFIED — control_status_registers.rst: mimpid (0xF13) is implemented
#   PMA_GRANULARITY: 3                     # VERIFIED — required by Sm extension schema (Q7); not used by M-mode cores without MMU

#   # PMP (Section 9 — PMP)
#   NUM_PMP_ENTRIES: 0                     # VERIFIED — cv32e40p_if_stage.sv:176 "PMP is not supported in CV32E40P"

#   # HPM Counters (Section 8 — HPM Counters)
#   HPM_EVENTS: [0]                        # UNKNOWN — perf_counters.rst (needs manual clarification)
#   HPM_COUNTER_EN: [                      # VERIFIED — NUM_MHPMCOUNTERS=1 baseline; only index 3 active
#       false,
#       false,
#       false, # indexes 0..2 (MCYCLE, MINSTRET, unused)
#       true,  # index 3 (MHPMCOUNTER3 — only counter for NUM_MHPMCOUNTERS=1)
