#       false,
#       false,
#       false,
#       false,
#       false,
#       false,
#       false,
#       false, # 24..31
#     ]
#   COUNTINHIBIT_EN:                       # VERIFIED — mcountinhibit CSR (Smhpm 1.11.0); only [0,2,3] inhibitable
#     [
#       true,  # index 0 (MCYCLE inhibit)
#       false, # index 1 (unused, TM always RO)
#       true,  # index 2 (MINSTRET inhibit)
#       true,  # index 3 (MHPMCOUNTER3 inhibit — only counter)
#       false, # index 4 (no counter 4)
