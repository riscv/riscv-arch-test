normative_rule_definitions:
  # The Zicfiss extension adds the SSE field in senvcfg. When the SSE field is set
  # to 1, the Zicfiss extension is activated in VU/U-mode. When the SSE field is 0,
  # the Zicfiss extension remains inactive in VU/U-mode, and the following rules
  # apply:
  - names: [senvcfg-sse_Zicfiss]
    coverpoint: [""]

  # If the privilege mode is less than M and menvcfg.SSE is 0, an
  # illegal-instruction exception is raised. Attempts to access the ssp CSR may
  # result in either an illegal-instruction exception or a virtual-instruction
  # exception, contingent upon the state of the x`envcfg.SSE` fields. The conditions
  # are specified as follows:
  - name: Zicfiss_ssp_below_m_mode
    coverpoint: [""]

  # Otherwise, if in U-mode and senvcfg.SSE is 0, an illegal-instruction exception
  # is raised. Attempts to access the ssp CSR may result in either an
  # illegal-instruction exception or a virtual-instruction exception, contingent
  # upon the state of the x`envcfg.SSE` fields. The conditions are specified as
  # follows:
  - name: Zicfiss_ssp_u_mode
    coverpoint: [""]

  # Otherwise, if in VS-mode and henvcfg.SSE is 0, a virtual-instruction exception
  # is raised. Attempts to access the ssp CSR may result in either an
  # illegal-instruction exception or a virtual-instruction exception, contingent
  # upon the state of the x`envcfg.SSE` fields. The conditions are specified as
  # follows:
  - name: Zicfiss_ssp_vs_mode
    coverpoint: [""]

  # Otherwise, if in VU-mode and either henvcfg.SSE or senvcfg.SSE is 0, a
  # virtual-instruction exception is raised. Attempts to access the ssp CSR may
  # result in either an illegal-instruction exception or a virtual-instruction
  # exception, contingent upon the state of the x`envcfg.SSE` fields. The conditions
  # are specified as follows:
  - name: Zicfiss_ssp_vu_mode
    coverpoint: [""]

  # Otherwise, the access is allowed. Attempts to access the ssp CSR may result in
  # either an illegal-instruction exception or a virtual-instruction exception,
  # contingent upon the state of the x`envcfg.SSE` fields. The conditions are
  # specified as follows:
  - name: Zicfiss_ssp_hs_modes
    coverpoint: [""]

  # When S-mode is not implemented, then xSSE is 0 at both M and U privilege modes.
  - name: Zicfiss_smode-xsse
    coverpoint: [""]

  # The encoding R=0, W=1, and X=0, is defined to represent an SS page.
  - name: ss_page_enc
    coverpoint: [""]

  # When menvcfg.SSE=0, this encoding remains reserved.
  - name: ssmp_menvcfg-sse
    coverpoint: [""]

  # Similarly, when V=1 and henvcfg.SSE=0, this encoding remains reserved at VS and
  # VU levels.
  - name: ssmp_henvcfg-sse
    coverpoint: [""]

  # If satp.MODE (or vsatp.MODE when V=1) is set to Bare and the effective privilege
  # mode is less than M, shadow stack instructions raise a store/AMO access-fault
  # exception.
  - name: satp-mode_bare
    coverpoint: [""]

  # When the effective privilege mode is M, memory access by an SSAMOSWAP.W/D
  # instruction results in a store/AMO access-fault exception.
  - name: ssmp_ssamoswap
    coverpoint: [""]

  # Memory mapped as an SS page cannot be written to by instructions other than
  # SSAMOSWAP.W/D, SSPUSH, and C.SSPUSH. Attempts will raise a store/AMO
  # access-fault exception. Access to a SS page using cache-block operation (CBO.*)
  # instructions is not permitted. Such accesses will raise a store/AMO access-fault
  # exception. Implicit accesses, including instruction fetches to an SS page, are
  # not permitted. Such accesses will raise an access-fault exception appropriate to
  # the access type. However, the shadow stack is readable by all instructions that
  # only load from memory. If a shadow stack (SS) instruction raises an
  # access-fault, page-fault, or guest-page-fault exception that is supposed to
  # indicate the original instruction type (load or store/AMO), then the reported
  # exception cause is respectively a store/AMO access fault (code 7), a store/AMO
  # page fault (code 15), or a store/AMO guest-page fault (code 23). Should a shadow
  # stack instruction access a page that is not designated as a shadow stack page
  # and is not marked as read-only (pte.xwr=001), a store/AMO access-fault exception
  # will be invoked. Conversely, if the page being accessed by a shadow stack
  # instruction is a read-only page, a store/AMO page-fault exception will be
  # triggered.
  - name: ss_page_exceptions
    coverpoint: [""]

  # If the virtual address in ssp is not XLEN aligned, then the SSPUSH/
  # C.SSPUSH/SSPOPCHK/C.SSPOPCHK instructions cause a store/AMO access-fault
  # exception.
  - name: ssp_xlen_aligned
    coverpoint: [""]

  # If the memory referenced by SSPUSH/C.SSPUSH/SSPOPCHK/C.SSPOPCHK/SSAMOSWAP.W/D
  # instructions is not idempotent, then the instructions cause a store/AMO
  # access-fault exception.
  - name: ssmp_ss_idempotent_memory
    coverpoint: [""]

  # When G-stage page tables are active, the shadow stack instructions that access
  # memory require the G-stage page table to have read-write permission for the
  # accessed memory; else a store/AMO guest-page-fault exception is raised.
  - name: active_g_stage_pte
    coverpoint: [""]
