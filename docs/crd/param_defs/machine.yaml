  # CSR mconfigptr
  - name: MCONFIGPTR_VAL
    impl-def: MCONFIGPTR_VAL
    type: boolean

  # CSR menvcfg
  - name: MENVCFG_FIOM_RDONLY0_OK
    impl-def: MENVCFG_FIOM_RDONLY0_OK
    type: boolean
  - name: MTIME_TICK_PERIOD
    impl-def: MTIME_TICK_PERIOD
    type: uint
    width: 64
  - names: [MRET_CLR_LR_RESV, SRET_CLR_LR_RESV]
    type: boolean
    description: TBD

  # WFI instruction
  - name: WFI_OPT_U_MODE
    impl-def: WFI_OPT_U_MODE
    type: boolean
  - name: WFI_RESUME_REASON
    impl-def: WFI_RESUME_REASON
    type: boolean
  - name: MCAUSE_RST_VAL
    impl-def: MCAUSE_RST_VAL
    type: boolean
  - name: PMP_A_L_RST
    impl-def: PMP_A_L_RST
    type: boolean
  - name: MSECCFG_MML_MMWP_RLB_RST
    impl-def: MSECCFG_MML_MMWP_RLB_RST
    type: boolean
  - name: MSECCFG_USEED_SSEED_RST
    impl-def: MSECCFG_USEED_SSEED_RST
    type: boolean
  - name: MCAUSE_RST_ALIAS_OK
    impl-def: MCAUSE_RST_ALIAS_OK
    type: boolean

  # PMAs (Physical Memory Attributes)
  - name: PMA_MM_IFETCH
    impl-def: PMA_MM_IFETCH
    type: boolean
  - name: PMA_CACHE_MM_ALL_ATOMICS
    impl-def: PMA_CACHE_MM_ALL_ATOMICS
    type: boolean
  - name: PMA_MAG_OP_LDST
    impl-def: PMA_MAG_OP_LDST
    type: boolean
  - name: PMA_MAG_EXC
    impl-def: PMA_MAG_EXC
    type: boolean
  - name: PMA_MO_DYN
    impl-def: PMA_MO_DYN
    type: boolean
  - name: PMA_IDP_IMPLICIT_SZ
    impl-def: PMA_IDP_IMPLICIT_SZ
    type: boolean

  # Traps - Mechanism for handling exceptions and interrupts)
  - name: CRITICAL_ERROR
    impl-def: CRITICAL_ERROR
    type: boolean
  - name: NMI_MCAUSE_VAL
    impl-def: NMI_MCAUSE_VAL
    type: boolean
  - name: SXLEN
    type: [32, 64]
    description: Effective XLEN in S-mode
  - name: UXLEN
    type: [32, 64]
    description: Effective XLEN in U-mode
  - name: XLEN_REDUCTION_HINT_OP
    impl-def: XLEN_REDUCTION_HINT_OP
    type: boolean
  - name: RST_ADDR
    type: uint
    width: MXLEN
    description: Base address of the reset vector.
  - name: NMI_ADDR
    type: uint
    width: MXLEN
    description: Base address of the non-maskable interrupt vector.

  # PMP (Physical Memory Protection)
  - name: PMP_GRANULARITY
    impl-def: PMP_GRANULARITY
    type: uint
    width: 64
    description: Minimum PMP region granularity supported by the platform
  - name: PMP_ENTRY_COUNT
    impl-def: PMP_ENTRY_COUNT
    type: uint
    width: 64
    description: PMP supports up to 64 entries with allowed implementation counts and ordering rules

