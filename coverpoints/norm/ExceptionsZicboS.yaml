# Mapping of normative rules to coverpoints for a test suite

normative_rule_definitions:
  - name: menvcfg_cbze_op
    coverpoint: ["ExceptionsZicboS_cg/cp_cbze"]
  - name: menvcfg_cbcfe_op
    coverpoint: ["ExceptionsZicboS_cg/cp_cbcfe"]
  - name: menvcfg_cbie_op
    coverpoint: ["ExceptionsZicboS_cg/cp_cbie"]
  - name: menvcfg_cbie_cbo-inval_op
    coverpoint: ["ExceptionsZicboS_cg/cp_cbie"]

  # The Zicbom extension adds the CBCFE (Cache Block Clean and Flush instruction
  # Enable) field to senvcfg to control execution of the CBO.CLEAN and CBO.FLUSH
  # instructions in U-mode. Execution of these instructions in U-mode is enabled
  # only if execution of these instructions is enabled for use in S-mode and CBCFE
  # is set to 1; otherwise, an illegal-instruction exception is raised. When the
  # Zicbom extension is not implemented, CBCFE is read-only zero.
  - name: senvcfg_cbcfe
    coverpoint: ["ExceptionsZicboS_cg/cp_cbcfe"]

  # The Zicbom extension adds the CBIE (Cache Block Invalidate instruction Enable)
  # WARL field to senvcfg to control execution of the CBO.INVAL instruction in
  # U-mode. The encoding 10b is reserved. When the Zicbom extension is not
  # implemented, CBIE is read-only zero. Execution of CBO.INVAL in U-mode is enabled
  # only if execution of the instruction is enabled for use in S-mode and CBIE is
  # set to 01b or 11b; otherwise, an illegal-instruction exception is raised.
  - name: senvcfg_cbie
    coverpoint: ["ExceptionsZicboS_cg/cp_cbie"]

  # If CBO.INVAL is enabled in S-mode to perform a flush operation, then when the
  # instruction is enabled in U-mode it performs a flush operation, even if CBIE is
  # set to 11b. Otherwise, the instruction behaves as follows, depending on the CBIE
  # encoding:
  - name: cbo-inval_s-mode_op
    coverpoint: ["ExceptionsZicboS_cg/cp_cbie"]

  # The Zicboz extension adds the CBZE (Cache Block Zero instruction enable) field
  # to senvcfg. The CBZE field controls execution of the cache block zero
  # instruction (CBO.ZERO) in U-mode. Execution of CBO.ZERO in U-mode is enabled
  # only if execution of the instruction is enabled for use in S-mode and CBZE is
  # set to 1; otherwise, an illegal-instruction exception is raised. When the Zicboz
  # extension is not implemented, CBZE is read-only zero.
  - name: senvcfg_cbze
    coverpoint: ["ExceptionsZicboS_cg/cp_cbze"]

  # The CBIE/CBCFE/CBZE fields in each xenvcfg register do not affect the read and
  # write behavior of the same fields in the other xenvcfg registers.
  - name: cbxe_unaffected
    coverpoint: ["ExceptionsZicboS_cg/{cp_cbie, cp_cbcfe, cp_cbze}"]

  # A CBO.INVAL instruction executes or raises either an illegal-instruction
  # exception or a virtual-instruction exception based on the state of the
  # xenvcfg.CBIE fields:
  - name: cbo-inval
    coverpoint: ["ExceptionsZicboS_cg/cp_cbie"]

  # A CBO.CLEAN or CBO.FLUSH instruction executes or raises an illegal-instruction
  # or virtual-instruction exception based on the state of the xenvcfg.CBCFE bits:
  - name: cbo-clean_cbo-flush
    coverpoint: ["ExceptionsZicboS_cg/cp_cbcfe"]

  # Finally, a CBO.ZERO instruction executes or raises an illegal-instruction or
  # virtual-instruction exception based on the state of the xenvcfg.CBZE bits:
  - name: cbo-zero_basedon_xenvcfg-CBZE
    coverpoint: ["ExceptionsZicboS_cg/cp_cbze"]

  # When a page-fault, guest-page-fault, or access-fault exception is taken, the
  # relevant *tval CSR is written with the faulting effective address (i.e. the
  # value of rs1).
  - name: fault_excep_csr
    coverpoint: ["ExceptionsZicboS_cg/cp_cbo_access"]

  # CMO instructions do not generate address-misaligned exceptions.
  - name: no_addr_misaligned_excep
    coverpoint: ["ExceptionsZicboS_cg/cp_cbo_misaligned"]

  # A cache-block management instruction is permitted to access the specified cache
  # block whenever a load instruction or store instruction is permitted to access
  # the corresponding physical addresses.
  - name: cbm_access
    coverpoint: ["spot tested with Zicbom_cbo_clean_cg/cp_custom_cbo"]

  # If access to the cache block is not permitted, a cache-block management
  # instruction raises a store page-fault or store guest-page-fault exception if
  # address translation does not permit any access or raises a store access-fault
  # exception otherwise.
  - name: cbm_unperm_fault
    coverpoint: ["ExceptionsZicboS_cg/cp_cbo_access"]

  # A cache-block zero instruction is permitted to access the specified cache block
  # whenever a store instruction is permitted to access the corresponding physical
  # addresses and when the PMAs indicate that cache-block zero instructions are a
  # supported access type.
  - name: cbz_access
    coverpoint: ["spot tested with Zicboz_cbo_zero_cg/cp_custom_cbo"]

  # If access to the cache block is not permitted, a cache-block zero instruction
  # raises a store page-fault or store guest-page-fault exception if address
  # translation does not permit write access or raises a store access-fault
  # exception otherwise.
  - name: cbz_unperm_fault
    coverpoint: ["ExceptionsZicboS_cg/cp_cbo_access"]
