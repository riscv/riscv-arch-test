  # index on which the trap was taken.
  - names: [epc_op_V_trap, vstart_op_V_trap]
    coverpoint: [""]

  # Any of these extensions can be added to base ISAs with XLEN=32 or XLEN=64.
  - name: Zve_XLEN
    coverpoint: [""]

  # The Zve32f and Zve64x extensions depend on the Zve32x extension.
  - name: Zve32f_Zve64x_dependent_Zve32x
    coverpoint: [""]

  # The Zve64f extension depends on the Zve32f and Zve64x extensions.
  - name: Zve64f_dependent_Zve32f_Zve64x
    coverpoint: [""]

  # The Zve64d extension depends on the Zve64f extension.
  - name: Zve64d_dependent_Zve64f
    coverpoint: [""]

  # All Zve* extensions have precise traps.
  - name: Zve_precise_traps
    coverpoint: [""]

  # All Zve* extensions provide support for EEW of 8, 16, and 32, and Zve64*
