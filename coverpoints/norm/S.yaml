# Normative rule to coverpoint mappings
# Generated from riscv-isa-manual normative rule definitions

normative_rule_definitions:
  # The sstatus register is an SXLEN-bit read/write register formatted as shown in
  # when SXLEN=32 and when SXLEN=64. The sstatus register keeps track of the
  # processor&#8217;s current operating state.
  - names: [sstatus_sz, sstatus_mode, sstatus_acc]
    coverpoint:
      [
        "S_scsr_cg/cp_scsr_access/sstatus TODO: should xstatus not exercise all bits because of WPRI?",
      ]

  # The SPP bit indicates the privilege level at which a hart was executing before
  # entering supervisor mode. When a trap is taken, SPP is set to 0 if the trap
  # originated from user mode, or 1 otherwise. When an SRET instruction (see ) is
  # executed to return from the trap handler, the privilege level is set to user
  # mode if the SPP bit is 0, or supervisor mode if the SPP bit is 1; SPP is then
  # set to 0.
  - names: [sstatus-spp_sz, sstatus-spp_acc, sstatus-spp_op]
    coverpoint: ["S_sprivist_cg/cp_sret_s"]

  # The SIE bit enables or disables all interrupts in supervisor mode. When SIE is
  # clear, interrupts are not taken while in supervisor mode. When the hart is
  # running in user-mode, the value in SIE is ignored, and supervisor-level
  # interrupts are enabled. The supervisor can disable individual interrupt sources
  # using the sie CSR.
  - names: [sstatus-sie_sz, sstatus-sie_acc, sstatus-sie_op]
    coverpoint: ["InterruptsS_cg/{cp_priority_mie_s, cp_user_mti}"]

  # The SPIE bit indicates whether supervisor interrupts were enabled prior to
  # trapping into supervisor mode. When a trap is taken into supervisor mode, SPIE
  # is set to SIE, and SIE is set to 0. When an SRET instruction is executed, SIE is
  # set to SPIE, then SPIE is set to 1.
  - names: [sstatus-spie_sz, sstatus-spie_acc, sstatus-spie_op]
    coverpoint:
      [
        "InterruptsS_cg/cp_user_mti, ExceptionsS_cg/cp_medeleg_msu_illegalinstruction, S_sprivist_cg/cp_sret_s",
      ]

  # The UXL field controls the value of XLEN for U-mode, termed UXLEN, which may
  # differ from the value of XLEN for S-mode, termed SXLEN. The encoding of UXL is
  # the same as that of the MXL field of misa, shown in .
  - names: [sstatus-uxl_acc, sstatus-uxl_op]
    coverpoint: ["OUT-OF-SCOPE"]

  # When SXLEN=32, the UXL field does not exist, and UXLEN=32. When SXLEN=64, it is
  # a WARL field that encodes the current value of UXLEN. In particular, an
  # implementation may make UXL be a read-only field whose value always ensures that
  # UXLEN=SXLEN.
  - name: sstatus-uxl_sz
    coverpoint: ["OUT-OF-SCOPE"]

  # If UXLEN≠SXLEN, instructions executed in the narrower mode must ignore source
  # register operand bits above the configured XLEN, and must sign-extend results to
  # fill the widest supported XLEN in the destination register.
  - name: sstatus-uxl_behavior
    coverpoint: ["OUT-OF-SCOPE"]

  # Some HINT instructions are encoded as integer computational instructions that
  # overwrite their destination register with its current value, e.g., c.addi x8, 0.
  # When such a HINT is executed with XLEN &lt; SXLEN and bits SXLEN..XLEN of the
  # destination register not all equal to bit XLEN-1, it is implementation-defined
  # whether bits SXLEN..XLEN of the destination register are unchanged or are
  # overwritten with copies of bit XLEN-1.
  - name: hint_sxlen
    coverpoint: ["OUT-OF-SCOPE"]

  # SUM is read-only 0 if satp.MODE is read-only 0.
  - name: sstatus-sum_satp-mode
    coverpoint: ["S_scsr_cg/cp_scsrwalk"]

  # The stvec register is an SXLEN-bit read/write register that holds trap vector
  # configuration, consisting of a vector base address (BASE) and a vector mode
  # (MODE).
  - names: [stvec_sz, stvec_acc, stvec_mode]
    coverpoint: ["S_scsr_cg/cp_scsr_access"]

  # The BASE field in stvec is a field that can hold any valid virtual or physical
  # address, subject to the following alignment constraints: the address must be
  # 4-byte aligned, and MODE settings other than Direct might impose additional
  # alignment constraints on the value in the BASE field.
  - name: stvec_op
    coverpoint: ["S_scsr_cg/cp_scsrwalk"]

  # Note that the CSR contains only bits XLEN-1 through 2 of the address BASE. When
  # used as an address, the lower two bits are filled with zeroes to obtain an
  # XLEN-bit address that is always aligned on a 4-byte boundary.
  - name: stvec_sz_base
    coverpoint: ["ExceptionsS_cg/cp_stvec"]

  # The sip register is an SXLEN-bit read/write register containing information on
  # pending interrupts, while sie is the corresponding SXLEN-bit read/write register
  # containing interrupt enable bits. Interrupt cause number i (as reported in CSR
  # scause, ) corresponds with bit i in both sip and sie. Bits 15:0 are allocated to
  # standard interrupt causes only, while bits 16 and above are designated for
  # platform use.
  - names: [sip_sz, sie_sz, sip_mode, sie_mode]
    coverpoint: ["S_scsr_cg/cp_scsrwalk, InterruptsS_cg/cp_priority_mip_s"]

  # An interrupt i will trap to S-mode if both of the following are true: (a) either
  # the current privilege mode is S and the SIE bit in the sstatus register is set,
  # or the current privilege mode has less privilege than S-mode; and (b) bit i is
  # set in both sip and sie.
  - name: sie_sip_supervisor_strap
    coverpoint: ["InterruptsS_cg/{cp_priority_both_s, cp_user_mti}"]

  # These conditions for an interrupt trap to occur must be evaluated in a bounded
  # amount of time from when an interrupt becomes, or ceases to be, pending in sip,
  # and must also be evaluated immediately following the execution of an SRET
  # instruction or an explicit write to a CSR on which these interrupt trap
  # conditions expressly depend (including sip, sie and sstatus).
  - name: sie_sip_strap_time_constraint
    coverpoint: ["TODO"]

  # Interrupts to S-mode take priority over any interrupts to lower privilege modes.
  - name: s_interrupt_priority
    coverpoint: ["TODO: move to hypervisor VS interrupts"]

  # Each individual bit in register sip may be writable or may be read-only.
  - name: sip_acc
    coverpoint: ["S_scsr_cg/cp_scsrwalk/sip"]

  # When bit i in sip is writable, a pending interrupt i can be cleared by writing 0
  # to this bit. If interrupt i can become pending but bit i in sip is read-only,
  # the implementation must provide some other mechanism for clearing the pending
  # interrupt (which may involve a call to the execution environment).
  - name: sip_op
    coverpoint: ["InterruptsS_cg/cp_trigger_ssi_sip"]

  # A bit in sie must be writable if the corresponding interrupt can ever become
  # pending. Bits of sie that are not writable are read-only zero.
  - name: sie_acc
    coverpoint: ["S_scsr_cg/cp_scsrwalk/sie, InterruptsS_cg/cp_priority_both_s"]

  # The standard portions (bits 15:0) of registers sip and sie are formatted as
  # shown in Figures and respectively.
  - name: sip_sie_bits_sz
    coverpoint: ["S_scsr_cg/cp_scsrwalk/sie"]

  # Bits sip.SEIP and sie.SEIE are the interrupt-pending and interrupt-enable bits
  # for supervisor-level external interrupts. If implemented, SEIP is read-only in
  # sip, and is set and cleared by the execution environment, typically through a
  # platform-specific interrupt controller.
  - names: [sip-seip_acc, sip-seip_op, sie-seie_acc, sie-seie_op]
    coverpoint: ["S_scsr_cg/cp_scsrwalk/sip, InterruptsS_cg/cp_trigger_sei"]

  # Bits sip.STIP and sie.STIE are the interrupt-pending and interrupt-enable bits
  # for supervisor-level timer interrupts. If implemented, STIP is read-only in sip.
  # When the Sstc extension is not implemented, STIP is set and cleared by the
  # execution environment. When the Sstc extension is implemented, STIP reflects the
  # timer interrupt signal resulting from stimecmp. The sip.STIP bit, in response to
  # timer interrupts generated by stimecmp, is set by writing stimecmp with a value
  # that is less than or equal to time, and is cleared by writing stimecmp with a
  # value greater than time.
  - names: [sip-stip_acc, sip-stip_op, sie-stie_acc, sie-stie_op]
    coverpoint: ["S_scsr_cg/cp_scsrwalk/sip, InterruptsS_cg/cp_trigger_sti"]

  # Bits sip.SSIP and sie.SSIE are the interrupt-pending and interrupt-enable bits
  # for supervisor-level software interrupts. If implemented, SSIP is writable in
  # sip and may also be set to 1 by a platform-specific interrupt controller.
  - names: [sip-ssip_acc, sip-ssip_op, sie-ssie_acc, sie-ssie_op]
    coverpoint:
      [
        "S_scsr_cg/cp_scsrwalk/sip, InterruptsS_cg/cp_trigger_ssi, InterruptsS_cg/cp_trigger_ssi_sip",
      ]

  # Each standard interrupt type (SEI, STI, SSI, or LCOFI) may not be implemented,
  # in which case the corresponding interrupt-pending and interrupt-enable bits are
  # read-only zeros. All bits in sip and sie are WARL fields. The implemented
  # interrupts may be found by writing one to every bit location in sie, then
  # reading back to see which bit positions hold a one.
  - names: [sip_unimpl_acc, sie_unimpl_acc]
    coverpoint: ["S_scsr_cg/cp_scsr_access/{sie, sip}"]

  # Multiple simultaneous interrupts destined for supervisor mode are handled in the
  # following decreasing priority order: SEI, SSI, STI, LCOFI.
  - names: [sip_priority_bit_order, sie_priority_bit_order]
    coverpoint: ["InterruptsS_cg/cp_priority_mip"]

  # The implementation must provide a facility for scheduling timer interrupts in
  # terms of the real-time counter, time.
  - name: supervisor_timer_scheduling
    coverpoint: ["In"]

  # The sscratch CSR is an SXLEN-bit read/write register, dedicated for use by the
  # supervisor. Typically, sscratch is used to hold a pointer to the hart-local
  # supervisor context while the hart is executing user code. At the beginning of a
  # trap handler, software normally uses a CSRRW instruction to swap sscratch with
  # an integer register to obtain an initial working register.
  - names: [sscratch_sz, sscratch_acc, sscratch_mode]
    coverpoint: ["S_scsr_cg/cp_scsr_access/sscratch"]

  # sepc is an SXLEN-bit read/write CSR formatted as shown in . The low bit of sepc
  # (sepc[0]) is always zero. On implementations that support only IALIGN=32, the
  # two low bits (sepc[1:0]) are always zero.
  - names: [sepc_sz, sepc_acc, sepc_op, sepc_mode]
    coverpoint: ["S_scsr_cg/cp_scsr_access/sepc"]

  # If an implementation allows IALIGN to be either 16 or 32 (by changing CSR misa,
  # for example), then, whenever IALIGN=32, bit sepc[1] is masked on reads so that
  # it appears to be 0. This masking occurs also for the implicit read by the SRET
  # instruction. Though masked, sepc[1] remains writable when IALIGN=32.
  - name: sepc_op_mask_ialign32
    coverpoint: ["OUT-OF-SCOPE"]

  # sepc is a WARL register that must be able to hold all valid virtual addresses.
  # It need not be capable of holding all possible invalid addresses. Prior to
  # writing sepc, implementations may convert an invalid address into some other
  # invalid address that sepc is capable of holding.
  - name: sepc_acc_invalid_addr
    coverpoint: ["S_scsr_cg/cp_scsr_access/sepc"]

  # When a trap is taken into S-mode, sepc is written with the virtual address of
  # the instruction that was interrupted or that encountered the exception.
  # Otherwise, sepc is never written by the implementation, though it may be
  # explicitly written by software.
  - name: sepc_op_trap_write
    coverpoint:
      ["ExeptionsS_cg/cp_illegal_instruction, InterruptsS_cg/cp_interrupts_s"]

  # The scause CSR is an SXLEN-bit read-write register formatted as shown in . When
  # a trap is taken into S-mode, scause is written with a code indicating the event
  # that caused the trap. Otherwise, scause is never written by the implementation,
  # though it may be explicitly written by software.
  - names: [scause_sz, scause_acc, scause_op]
    coverpoint: [""]

  # The Interrupt bit in the scause register is set if the trap was caused by an
  # interrupt. The Exception Code field contains a code identifying the last
  # exception or interrupt. lists the possible exception codes for the current
  # supervisor ISAs. The Exception Code is a WLRL field. It is required to hold the
  # values 0–31 (i.e., bits 4–0 must be implemented), but otherwise it is only
  # guaranteed to hold supported exception codes.
  - names: [scause-interrupt_sz, scause-interrupt_op]
    coverpoint: [""]

  # The Exception Code is a WLRL field.
  - name: scause-exception_code_acc
    coverpoint: [""]

  # It is required to hold the values 0–31 (i.e., bits 4–0 must be implemented), but
  # otherwise it is only guaranteed to hold supported exception codes.
  - name: scause-exception_code_sz
    coverpoint: [""]

  # The stval CSR is an SXLEN-bit read-write register formatted as shown in . When a
  # trap is taken into S-mode, stval is written with exception-specific information
  # to assist software in handling the trap. Otherwise, stval is never written by
  # the implementation, though it may be explicitly written by software. The
  # hardware platform will specify which exceptions must set stval informatively,
  # which may unconditionally set it to zero, and which may exhibit either behavior,
  # depending on the underlying event that caused the exception.
  - names: [stval_sz, stval_op, stval_mode]
    coverpoint: [""]

  # If stval is written with a nonzero value when a breakpoint, address-misaligned,
  # access-fault, page-fault, or hardware-error exception occurs on an instruction
  # fetch, load, or store, then stval will contain the faulting virtual address.
  - name: stval_op_faulting_addr
    coverpoint: [""]

  # On a breakpoint exception raised by an EBREAK or C.EBREAK instruction, stval is
  # written with either zero or the virtual address of the instruction.
  - name: stval_op_breakpoint
    coverpoint: [""]

  # If stval is written with a nonzero value when a misaligned load or store causes
  # an access-fault, page-fault, or hardware-error exception, then stval will
  # contain the virtual address of the portion of the access that caused the fault.
  - name: stval_op_load_store_fault
    coverpoint: [""]

  # If stval is written with a nonzero value when an instruction access-fault,
  # page-fault, or hardware-error exception occurs on a hart with variable-length
  # instructions, then stval will contain the virtual address of the portion of the
  # instruction that caused the fault, while sepc will point to the beginning of the
  # instruction.
  - name: stval_faulting_address_variable_instr
    coverpoint: [""]

  # The stval register can optionally also be used to return the faulting
  # instruction bits on an illegal-instruction exception (sepc points to the
  # faulting instruction in memory). If stval is written with a nonzero value when
  # an illegal-instruction exception occurs, then stval will contain the shortest
  # of:
  - name: stval_op_illegal_instr
    coverpoint: [""]

  # The value loaded into stval on an illegal-instruction exception is
  # right-justified and all unused upper bits are cleared to zero.
  - name: stval_op_illegal_instr_format
    coverpoint: [""]

  # On a trap caused by a software-check exception, the stval register holds the
  # cause for the exception. The following encodings are defined:
  - name: stval_exception_info
    coverpoint: [""]

  # For other traps, stval is set to zero, but a future standard may redefine
  # stval’s setting for other traps.
  - name: stval_op_other_traps
    coverpoint: [""]

  # stval is a WARL register that must be able to hold all valid virtual addresses
  # and the value 0. It need not be capable of holding all possible invalid
  # addresses. Prior to writing stval, implementations may convert an invalid
  # address into some other invalid address that stval is capable of holding. If the
  # feature to return the faulting instruction bits is implemented, stval must also
  # be able to hold all values less than 2N, where N is the smaller of SXLEN and
  # ILEN.
  - name: stval_acc
    coverpoint: [""]

  # The senvcfg CSR is an SXLEN-bit read/write register, formatted as shown in ,
  # that controls certain characteristics of the U-mode execution environment.
  - names: [senvcfg_sz, senvcfg_acc, senvcfg_mode]
    coverpoint: [""]

  # If bit FIOM (Fence of I/O implies Memory) is set to one in senvcfg, FENCE
  # instructions executed in U-mode are modified so the requirement to order
  # accesses to device I/O implies also the requirement to order main memory
  # accesses. details the modified interpretation of FENCE instruction bits PI, PO,
  # SI, and SO in U-mode when FIOM=1.
  - names: [senvcfg-fiom_sz, senvcfg-fiom_op]
    coverpoint: [""]

  # Similarly, for U-mode when FIOM=1, if an atomic instruction that accesses a
  # region ordered as device I/O has its aq and/or rl bit set, then that instruction
  # is ordered as though it accesses both device I/O and memory.
  - name: senvcfg-fiom_op_atomic
    coverpoint: [""]

  # If satp.MODE is read-only zero (always Bare), the implementation may make FIOM
  # read-only zero.
  - name: senvcfg-fiom_acc
    coverpoint: [""]

  # If the Ssnpm extension is implemented, the PMM field enables or disables pointer
  # masking (see ) for the next-lower privilege mode (U/VU), according to the values
  # in . If Ssnpm is not implemented, PMM is read-only zero. The PMM field is
  # read-only zero for RV32.
  - name: senvcfg-pmm_Ssnpm
    coverpoint: [""]

  # The Zicfilp extension adds the LPE field in senvcfg. When the LPE field is set
  # to 1, the Zicfilp extension is enabled in VU/U-mode. When the LPE field is 0,
  # the Zicfilp extension is not enabled in VU/U-mode and the following rules apply
  # to VU/U-mode:
  - names: [senvcfg-lpe_Zicfilp_acc, senvcfg-lpe_Zicfilp_op]
    coverpoint: [""]

  # The Zicfiss extension adds the SSE field in senvcfg. When the SSE field is set
  # to 1, the Zicfiss extension is activated in VU/U-mode. When the SSE field is 0,
  # the Zicfiss extension remains inactive in VU/U-mode, and the following rules
  # apply:
  - names: [senvcfg-sse_Zicfilp_sz, senvcfg-sse_Zicfilp_op]
    coverpoint: [""]

  # The satp CSR is an SXLEN-bit read/write register, formatted as shown in for
  # SXLEN=32 and for SXLEN=64, which controls supervisor-mode address translation
  # and protection. This register holds the physical page number (PPN) of the root
  # page table, i.e., its supervisor physical address divided by 4 KiB; an address
  # space identifier (ASID), which facilitates address-translation fences on a
  # per-address-space basis; and the MODE field, which selects the current
  # address-translation scheme. Further details on the access to this register are
  # described in .
  - names: [satp_sz, satp_acc, satp_op, satp_mode]
    coverpoint: [""]

  # shows the encodings of the MODE field when SXLEN=32 and SXLEN=64. When
  # MODE=Bare, supervisor virtual addresses are equal to supervisor physical
  # addresses, and there is no additional memory protection beyond the physical
  # memory protection scheme described in . To select MODE=Bare, software must write
  # zero to the remaining fields of satp (bits 30–0 when SXLEN=32, or bits 59–0 when
  # SXLEN=64). Attempting to select MODE=Bare with a nonzero pattern in the
  # remaining fields has an UNSPECIFIED effect on the value that the remaining
  # fields assume and an UNSPECIFIED effect on address translation and protection
  # behavior.
  - names: [satp-mode_sz, satp-mode_acc, satp-mode_op]
    coverpoint: [""]

  # When SXLEN=32, the only other valid setting for MODE is Sv32, a paged
  # virtual-memory scheme described in .
  - name: satp-mode_sxlen32
    coverpoint: [""]

  # When SXLEN=64, three paged virtual-memory schemes are defined: Sv39, Sv48, and
  # Sv57, described in , , and , respectively. One additional scheme, Sv64, will be
  # defined in a later version of this specification. The remaining MODE settings
  # are reserved for future use and may define different interpretations of the
  # other fields in satp.
  - name: satp-mode_sxlen64
    coverpoint: [""]

  # Implementations are not required to support all MODE settings, and if satp is
  # written with an unsupported MODE, the entire write has no effect; no fields in
  # satp are modified.
  - name: satp-mode_op_unsupported
    coverpoint: [""]

  # The number of ASID bits is UNSPECIFIED and may be zero. The number of
  # implemented ASID bits, termed ASIDLEN, may be determined by writing one to every
  # bit position in the ASID field, then reading back the value in satp to see which
  # bit positions in the ASID field hold a one. The least-significant bits of ASID
  # are implemented first: that is, if ASIDLEN &gt; 0, ASID[ASIDLEN-1:0] is
  # writable. The maximal value of ASIDLEN, termed ASIDMAX, is 9 for Sv32 or 16 for
  # Sv39, Sv48, and Sv57.
  - name: satp-asidlen
    coverpoint: [""]

  # The satp CSR is considered active when the effective privilege mode is S-mode or
  # U-mode. Executions of the address-translation algorithm may only begin using a
  # given value of satp when satp is active.
  - name: satp_op_active
    coverpoint: [""]

  # Note that writing satp does not imply any ordering constraints between
  # page-table updates and subsequent address translations, nor does it imply any
  # invalidation of address-translation caches. If the new address space’s page
  # tables have been modified, or if an ASID is reused, it may be necessary to
  # execute an SFENCE.VMA instruction (see ) after, or in some cases before, writing
  # satp.
  - name: satp_op_sfence-vma
    coverpoint: [""]

  # The supervisor memory-management fence instruction SFENCE.VMA is used to
  # synchronize updates to in-memory memory-management data structures with current
  # execution. Instruction execution causes implicit reads and writes to these data
  # structures; however, these implicit references are ordinarily not ordered with
  # respect to explicit loads and stores. Executing an SFENCE.VMA instruction
  # guarantees that any previous stores already visible to the current RISC-V hart
  # are ordered before certain implicit references by subsequent instructions in
  # that hart to the memory-management data structures. The specific set of
  # operations ordered by SFENCE.VMA is determined by rs1 and rs2, as described
  # below. SFENCE.VMA is also used to invalidate entries in the address-translation
  # cache associated with a hart (see ). Further details on the behavior of this
  # instruction are described in and .
  - name: sfence-vma_op
    coverpoint: [""]

  # Executing an SFENCE.VMA instruction guarantees that any previous stores already
  # visible to the current RISC-V hart are ordered before certain implicit
  # references by subsequent instructions in that hart to the memory-management data
  # structures. The specific set of operations ordered by SFENCE.VMA is determined
  # by rs1 and rs2, as described below.
  - name: sfence-vma_ordering
    coverpoint: [""]

  # SFENCE.VMA is also used to invalidate entries in the address-translation cache
  # associated with a hart (see &lt;&lt;sv32algorithm&gt;&gt;).
  - name: sfence-vma_invalidation
    coverpoint: [""]

  # If rs1=x0 and rs2=x0, the fence orders all reads and writes made to any level of
  # the page tables, for all address spaces. The fence also invalidates all
  # address-translation cache entries, for all address spaces.
  - name: sfence-vma_all_asid_va
    coverpoint: [""]

  # If rs1=x0 and rs2{ne}x0, the fence orders all reads and writes made to any level
  # of the page tables, but only for the address space identified by integer
  # register rs2. Accesses to global mappings (see &lt;&lt;translation&gt;&gt;) are
  # not ordered. The fence also invalidates all address-translation cache entries
  # matching the address space identified by integer register rs2, except for
  # entries containing global mappings.
  - name: sfence-vma_asid_only
    coverpoint: [""]

  # If rs1{ne}x0 and rs2=x0, the fence orders only reads and writes made to leaf
  # page table entries corresponding to the virtual address in rs1, for all address
  # spaces. The fence also invalidates all address-translation cache entries that
  # contain leaf page table entries corresponding to the virtual address in rs1, for
  # all address spaces.
  - name: sfence-vma_va_all_asid
    coverpoint: [""]

  # If rs1{ne}x0 and rs2{ne}x0, the fence orders only reads and writes made to leaf
  # page table entries corresponding to the virtual address in rs1, for the address
  # space identified by integer register rs2. Accesses to global mappings are not
  # ordered. The fence also invalidates all address-translation cache entries that
  # contain leaf page table entries corresponding to the virtual address in rs1 and
  # that match the address space identified by integer register rs2, except for
  # entries containing global mappings.
  - name: sfence-vma_va_asid
    coverpoint: [""]

  # If the value held in rs1 is not a valid virtual address, then the SFENCE.VMA
  # instruction has no effect. No exception is raised in this case.
  - name: sfence-vma_invalid_va
    coverpoint: [""]

  # When rs2≠x0, bits SXLEN-1:ASIDMAX of the value held in rs2 are reserved for
  # future standard use. Until their use is defined by a standard extension, they
  # should be zeroed by software and ignored by current implementations.
  # Furthermore, if ASIDLEN&lt;ASIDMAX, the implementation shall ignore bits
  # ASIDMAX-1:ASIDLEN of the value held in rs2.
  - name: sfence-vma_rs2_bits
    coverpoint: [""]

  # An implicit read of the memory-management data structures may return any
  # translation for an address that was valid at any time since the most recent
  # SFENCE.VMA that subsumes that address. The ordering implied by SFENCE.VMA does
  # not place implicit reads and writes to the memory-management data structures
  # into the global memory order in a way that interacts cleanly with the standard
  # RVWMO ordering rules. In particular, even though an SFENCE.VMA orders prior
  # explicit accesses before subsequent implicit accesses, and those implicit
  # accesses are ordered before their associated explicit accesses, SFENCE.VMA does
  # not necessarily place prior explicit accesses before subsequent explicit
  # accesses in the global memory order. These implicit loads also need not
  # otherwise obey normal program order semantics with respect to prior loads or
  # stores to the same address.
  - name: sfence-vma_ordering_semantics
    coverpoint: [""]

  # Implementations must only perform implicit reads of the translation data
  # structures pointed to by the current contents of the satp register or a
  # subsequent valid (V=1) translation data structure entry, and must only raise
  # exceptions for implicit accesses that are generated as a result of instruction
  # execution, not those that are performed speculatively.
  - name: sfence-vma_implicit_access
    coverpoint: [""]

  # Changes to the sstatus fields SUM and MXR take effect immediately, without the
  # need to execute an SFENCE.VMA instruction.
  - name: sfence-vma-sum-mxr_effect
    coverpoint: [""]

  # Changing satp.MODE from Bare to other modes and vice versa also takes effect
  # immediately, without the need to execute an SFENCE.VMA instruction.
  - name: sfence-vma-mode_effect
    coverpoint: [""]

  # Likewise, changes to satp.ASID take effect immediately.
  - name: sfence-vma-asid_effect
    coverpoint: [""]

  # If a hart employs an address-translation cache, that cache must appear to be
  # private to that hart. In particular, the meaning of an ASID is local to a hart;
  # software may choose to use the same ASID to refer to different address spaces on
  # different harts.
  - name: asid_hart_private
    coverpoint: [""]

  # For implementations that make satp.MODE read-only zero (always Bare), attempts
  # to execute an SFENCE.VMA instruction might raise an illegal-instruction
  # exception.
  - name: satp-mode_roz_sfence_illegal
    coverpoint: [""]

  # Attempting to fetch an instruction from a page that does not have execute
  # permissions raises a fetch page-fault exception.
  - name: fetch_page_fault_no_x
    coverpoint: [""]

  # Attempting to execute a load, load-reserved, or cache-block management
  # instruction whose effective address lies within a page without read permissions
  # raises a load page-fault exception.
  - name: load_page_fault_no_r
    coverpoint: [""]

  # Attempting to execute a store, store-conditional, AMO, or cache-block zero
  # instruction instruction whose effective address lies within a page without write
  # permissions raises a store page-fault exception.
  - name: store_page_fault_no_w
    coverpoint: [""]

  # The stimecmp CSR is a 64-bit register and has 64-bit precision on all RV32 and
  # RV64 systems. In RV32 only, accesses to the stimecmp CSR access the low 32 bits,
  # while accesses to the stimecmph CSR access the high 32 bits of stimecmp.
  - name: stimecmp-stimecmph_sz_acc
    coverpoint: [""]

  # A supervisor timer interrupt becomes pending, as reflected in the STIP bit in
  # the mip and sip registers whenever time contains a value greater than or equal
  # to stimecmp, treating the values as unsigned integers. If the result of this
  # comparison changes, it is guaranteed to be reflected in STIP eventually, but not
  # necessarily immediately. The interrupt remains posted until stimecmp becomes
  # greater than time, typically as a result of writing stimecmp. The interrupt will
  # be taken based on the standard interrupt enable and delegation rules.
  - names: [mip_stip_op, sip_stip_op]
    coverpoint: [""]

  # The Zicboz extension adds the CBZE (Cache Block Zero instruction enable) field
  # to senvcfg. The CBZE field controls execution of the cache block zero
  # instruction (CBO.ZERO) in U-mode. Execution of CBO.ZERO in U-mode is enabled
  # only if execution of the instruction is enabled for use in S-mode and CBZE is
  # set to 1; otherwise, an illegal-instruction exception is raised. When the Zicboz
  # extension is not implemented, CBZE is read-only zero.
  - name: senvcfg-cbze
    coverpoint: [""]

  # The Zicbom extension adds the CBCFE (Cache Block Clean and Flush instruction
  # Enable) field to senvcfg to control execution of the CBO.CLEAN and CBO.FLUSH
  # instructions in U-mode. Execution of these instructions in U-mode is enabled
  # only if execution of these instructions is enabled for use in S-mode and CBCFE
  # is set to 1; otherwise, an illegal-instruction exception is raised. When the
  # Zicbom extension is not implemented, CBCFE is read-only zero.
  - name: senvcfg-cbcfe
    coverpoint: [""]

  # The Zicbom extension adds the CBIE (Cache Block Invalidate instruction Enable)
  # WARL field to senvcfg to control execution of the CBO.INVAL instruction in
  # U-mode. The encoding 10b is reserved. When the Zicbom extension is not
  # implemented, CBIE is read-only zero. Execution of CBO.INVAL in U-mode is enabled
  # only if execution of the instruction is enabled for use in S-mode and CBIE is
  # set to 01b or 11b; otherwise, an illegal-instruction exception is raised.
  - name: senvcfg-cbie
    coverpoint: [""]

  # If CBO.INVAL is enabled in S-mode to perform a flush operation, then when the
  # instruction is enabled in U-mode it performs a flush operation, even if CBIE is
  # set to 11b. Otherwise, the instruction behaves as follows, depending on the CBIE
  # encoding:
  - name: cbo-inval_s-mode_op
    coverpoint: [""]
