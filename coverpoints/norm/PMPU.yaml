# Normative rule to coverpoint mappings
# Generated from riscv-isa-manual normative rule definitions

normative_rule_definitions:
  # Attempting to execute a load, load-reserved, or cache-block management
  # instruction which accesses a physical address within a PMP region without read
  # permissions raises a load access-fault exception.
  - name: pmp_load_fault
    coverpoint: ["cp_cfg_A_off"]

  # Attempting to execute a store, store-conditional, AMO, or cache-block zero
  # instruction which accesses a physical address within a PMP region without write
  # permissions raises a store access-fault exception.
  - name: pmp_store_fault
    coverpoint: ["cp_cfg_A_off"]

  # In addition to locking the PMP entry, the L bit indicates whether the R/W/X
  # permissions are additionally enforced on M-mode accesses. When the L bit is set,
  # these permissions are enforced for all privilege modes. When the L bit is clear,
  # any M-mode access matching the PMP entry will succeed; the R/W/X permissions
  # apply only to S and U modes.
  - name: pmp_l_bit_m_mode_enforcement
    coverpoint: ["cp_cfg_RW"]

  # &lt;&lt;pmpcfg&gt;&gt; shows the layout of a PMP configuration register. The R,
  # W, and X bits, when set, indicate that the PMP entry permits read, write, and
  # instruction execution, respectively. When one of these bits is clear, the
  # corresponding access type is denied.
  - name: pmp_cfg_permissions
    coverpoint: ["cp_cfg_X/cp_cfg_RW"]

  # Failed memory operations generate an instruction, load, or store access-fault
  # exception.
  - name: pmp_access_fault_exception
    coverpoint: ["cp_cfg_X/cp_cfg_RW/cp_cfg_A_napot/cp_cfg_A_na4/cp_cfg_A_tor/cp_mprv"]

  # If a PMP entry matches all bytes of a memory operation, then the L, R, W, and X
  # bits determine whether the operation succeeds or fails. If the L bit is clear
  # and the privilege mode of the access is M, the operation succeeds. Otherwise, if
  # the L bit is set or the privilege mode of the access is S or U, then the
  # operation succeeds only if the R, W, or X bit corresponding to the access type
  # is set.
  - name: pmp_rwx_check
    coverpoint: ["cp_cfg_X/cp_cfg_RW/cp_none"]

  # If no PMP entry matches an M-mode memory operation, the operation succeeds. If
  # no PMP entry matches an S-mode or U-mode memory operation, but at least one PMP
  # entry is implemented, the operation fails.
  - name: pmp_no_entry_match
    coverpoint: ["cp_none"]

  # When A=0, this PMP entry is disabled and matches no addresses.
  - name: pmp_a_field_off
    coverpoint: ["cp_cfg_A_off"]

  # NAPOT ranges make use of the low-order bits of the associated address register
  # to encode the size of the range, as shown in &lt;&lt;pmpcfg-napot&gt;&gt;.
  - name: pmp_napot_encoding_low_bits
    coverpoint: ["cp_cfg_A_napot"]

  # naturally aligned power-of-2 regions (NAPOT), including the special case of
  # naturally aligned four-byte regions (NA4);
  - name: pmp_a_field_napot_na4
    coverpoint: ["cp_cfg_A_na4"]

  # If TOR is selected, the associated address register forms the top of the address
  # range, and the preceding PMP address register forms the bottom of the address
  # range. If PMP entry i's A field is set to TOR, the entry matches any address y
  # such that pmpaddr~i-1~{le}y&lt;pmpaddr~i~ (irrespective of the value of
  # pmpcfg~i-1~). If PMP entry 0's A field is set to TOR, zero is used for the lower
  # bound, and so it matches any address y&lt;pmpaddr~0~.
  - name: pmp_a_field_tor
    coverpoint: ["cp_cfg_A_tor"]

  # PMP checks are applied to all accesses whose effective privilege mode is S or U,
  # including instruction fetches and data accesses in S and U mode, and data
  # accesses in M-mode when the MPRV bit in mstatus is set and the MPP field in
  # mstatus contains S or U.
  - name: pmp_check_priv_modes
    coverpoint: ["cp_mprv"]

  # PMP CSRs are only accessible to M-mode.
  - name: pmp_csr_mode
    coverpoint: ["cp_pmpaddr_access_u/cp_pmpcfg_access"]

  # The PMP address registers are CSRs named pmpaddr0-pmpaddr63.
  - name: pmp_addr_registers
    coverpoint: ["cp_pmpaddr_access_u"]

  # For RV32, sixteen CSRs, pmpcfg0–pmpcfg15, hold the configurations
  # pmp0cfg–pmp63cfg for the 64 PMP entries, as shown in
  # &lt;&lt;pmpcfg-rv32&gt;&gt;.
  - name: pmp_cfg_rv32_layout
    coverpoint: ["cp_pmpcfg_access"]

  # For RV64, eight even-numbered CSRs, pmpcfg0, pmpcfg2, …, pmpcfg14, hold the
  # configurations for the 64 PMP entries, as shown in &lt;&lt;pmpcfg-rv64&gt;&gt;.
  - name: pmp_cfg_rv64_layout
    coverpoint: ["cp_pmpcfg_access"]