---
# yaml-language-server: $schema=../../docs-resources/schemas/param-defs-schema.json

$schema: "../../docs-resources/schemas/param-defs-schema.json#"

# Used to create parameters for smctr file.
# Tags refer to anchors in any adoc file for any ISA manual.

chapter_name: SmCtr (Ctrl Xfer Records)

parameter_definitions:
  - name: CTRDATA_CC_SUPPORTED
    impl-def: CTRDATA_CC_SUPPORTED
    type: boolean
    description: ctrdata register may optionally include a count of CPU cycles
  - name: CTR_CCOUNTER_IMPL
    impl-def: CTR_CCOUNTER_IMPL
    range: [0, 4]
    description: Implementation can support 0 to 4 exponent bits
  - name: SCTRDEPTH_DEPTH
    impl-def: SCTRDEPTH_DEPTH
    range: [0, 4]
    description: |
      Depth of the control transfer record buffer, in entries.

      [%autowidth]
      !===
      ! Value ! Definition

      ! 0 ! 16 entries
      ! 1 ! 32 entries
      ! 2 ! 64 entries
      ! 3 ! 128 entries
      ! 4 ! 256 entries
      ! 5-7 ! Reserved
      !===

csr_definitions:
  - reg-name: sctrdepth
    field-name: DEPTH
    impl-def: SCTRDEPTH_DEPTH_WARL
  - reg-name: sctrstatus
    field-name: WRPTR
    impl-def: SCTRSTATUS_WRPTR_WARL
  - reg-name: ctrsource
    impl-def: CTRSOURCE_WARL
  - reg-name: ctrtarget
    impl-def: CTRTARGET_WARL
