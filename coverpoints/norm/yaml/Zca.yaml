# Mapping of normative rules to coverpoints for a test suite

normative_rule_definitions:
  - name: Zca_offsets_mul2
    coverpoint:
      [
        "Zca_c_beqz_cg/cp_offset, Zca_c_bnez_cg/cp_offset, Zca_c_j_cg/cp_offset, Zca_c_jal_cg/cp_offset, Zca_c_jalr_cg/cp_offset_c_jr, Zca_c_jr_cg/cp_offset_c_jr",
      ]
  - name: Zca_regs8
    # Use a representative coverpoint; applies to others too
    coverpoint: ["Zca_c_and_cg/{cp_rs1p, cp_rs2p}"]
  - name: c-add_op
    coverpoint: ["Zca_c_add_cg/{cp_rs1_nx0, cp_rs2_nx0, cr_rs1_rs2_edges}"]
  - name: c-add_hint
    coverpoint: ["TODO"]
  - name: c-add_val
    coverpoint: ["Zca_c_add_cg/{cp_rs1_nx0, cp_rs2_nx0}"]
  - name: c-addi16sp_op
    coverpoint: ["Zca_c_addi16sp_cg/{cp_imm_mul_addi16sp}"]
  - name: c-addi4spn_op
    coverpoint: ["Zca_c_addi4spn_cg/{cp_imm_mul_addi4spn}"]
  - name: c-addi_nop
    coverpoint: ["Zca_c_nop_cg/{cp_asm_count}"]
