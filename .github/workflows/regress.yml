name: ACT Regression

on:
  push:
  pull_request:

jobs:
  lint:
    name: Pre-commit check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Ensure pre-commit checks pass
        run: uvx pre-commit run --all-files --show-diff-on-failure --color=always

  regress:
    name: ACT Regression (${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          [
            sail/sail-RVI20U32,
            sail/sail-RVI20U64,
            sail/sail-rv32-max,
            sail/sail-rv64-max,
          ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install sail-riscv model
        run: |
          sudo mkdir -p /usr/local
          curl --location https://github.com/riscv/sail-riscv/releases/download/0.9/sail-riscv-$(uname)-$(arch).tar.gz | sudo tar xvz --directory=/usr/local --strip-components=1

      - name: Install RISC-V GCC toolchain
        run: curl --location https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2025.07.16/riscv64-elf-ubuntu-22.04-gcc-nightly-2025.07.16-nightly.tar.xz | sudo tar xvJ --directory=/usr/local --strip-components=1

      - name: Generate tests and coverpoints
        run: make tests --jobs $(nproc)

      - name: Compile and run tests on Sail
        run: DOCKER=1 CONFIG_FILES="config/${{ matrix.config }}/test_config.yaml" EXTENSIONS="" make --jobs $(nproc)

  spike:
    name: Spike Regression (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [spike-rv64-max, spike-rv32-max, spike-RVI20U32, spike-RVI20U64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y device-tree-compiler \
                                  libboost-regex-dev \
                                  libboost-system-dev

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install sail-riscv model
        run: |
          sudo mkdir -p /usr/local
          curl --location https://github.com/riscv/sail-riscv/releases/download/0.9/sail-riscv-$(uname)-$(arch).tar.gz | sudo tar xvz --directory=/usr/local --strip-components=1

      - name: Get Latest Spike Commit
        run: |
          SPIKE_HASH=$(git ls-remote https://github.com/riscv/riscv-isa-sim.git HEAD | awk '{ print $1}')
          echo "SPIKE_HASH=$SPIKE_HASH" >> "$GITHUB_ENV"

      - name: Restore cached Spike
        id: cache-spike-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/spike
          key: spike-${{ env.SPIKE_HASH }}-RV${{ matrix.xlen }}

      - name: Install Spike
        if: steps.cache-spike-restore.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/riscv/riscv-isa-sim.git
          cd riscv-isa-sim
          mkdir build
          cd build
          ../configure --prefix=$GITHUB_WORKSPACE/spike
          make -j$(nproc)
          make install

      - name: Save cached Spike
        if: steps.cache-spike-restore.outputs.cache-hit != 'true'
        id: cache-spike-save
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/spike
          key: ${{ steps.cache-spike-restore.outputs.cache-primary-key }}

      - name: Add Spike to PATH
        run: echo $GITHUB_WORKSPACE/spike/bin >> $GITHUB_PATH

      - name: Install RISC-V GCC toolchain
        run: curl --location https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2025.07.16/riscv64-elf-ubuntu-22.04-gcc-nightly-2025.07.16-nightly.tar.xz | sudo tar xvJ --directory=/usr/local --strip-components=1

      - name: Compile and run tests on Sail
        run: DOCKER=1 EXTENSIONS=I,M,F,D,Zca,Zcf,Zcd,Zaamo,Zalrsc,Zifencei make ${{ matrix.target }} --jobs $(nproc)

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-logs
          path: work/${{ matrix.target }}-max/logs

  vector-testgen:
    name: Vector Testgen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Generate vector tests
        run: make vector-tests --jobs $(nproc)

  ctp-build:
    name: Build CTP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - run: git submodule update --init ctp/docs-resources crd/docs-resources external/riscv-unified-db

      - name: Pull Container
        run: docker pull riscvintl/riscv-docs-base-container-image:latest

      - name: Build
        run: cd ctp && make -j2

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ctp.pdf
          path: ctp/build/ctp.pdf

      - name: Upload HTML
        uses: actions/upload-artifact@v4
        with:
          name: ctp.html
          path: ctp/build/ctp.html

  # This is here so that the "Status checks that are required" Github
  # option doesn't need to list all of the matrix jobs (it doesn't seem
  # to work if you just specify the job ID of the matrix itself).
  ci_pass:
    runs-on: ubuntu-latest
    needs: [lint, regress, spike, vector-testgen, ctp-build]
    steps:
      - name: Dummy
        run: echo 'Jobs need at least one step.'
